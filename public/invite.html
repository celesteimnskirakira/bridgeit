<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BridgeIt - 邀请</title>
  <link rel="manifest" href="/manifest.json">
  <link rel="stylesheet" href="/css/mobile.css">
  <style>
    .invite-wrap {
      min-height: 100vh; display: flex; flex-direction: column;
      align-items: center; justify-content: center; padding: 24px;
      background: linear-gradient(135deg, #7B1FA2 0%, #1976D2 100%);
    }
    .invite-card { background: white; border-radius: 24px; padding: 36px 28px; width: 100%; max-width: 380px; text-align: center; }
    .invite-avatar { width: 72px; height: 72px; border-radius: 50%;
      background: linear-gradient(135deg, #7B1FA2, #1976D2);
      display: flex; align-items: center; justify-content: center;
      color: white; font-size: 2rem; font-weight: 700; margin: 0 auto 16px; }
    .invite-title { font-size: 1.1rem; color: #333; margin-bottom: 6px; }
    .inviter-name { font-size: 1.4rem; font-weight: 700;
      background: linear-gradient(135deg, #7B1FA2, #1976D2);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 24px; }
    .btn-gap { margin-top: 12px; }
    .error { color: #F44336; font-size: 0.82rem; margin-bottom: 12px; display: none; }
  </style>
</head>
<body>
<div class="invite-wrap">
  <div class="invite-card" id="invite-card">
    <div style="text-align:center;color:#999;padding:20px">加载中...</div>
  </div>
</div>
<script>
  const token = localStorage.getItem('bridgeit_token');
  const params = new URLSearchParams(window.location.search);
  const inviteToken = params.get('token');

  if (!inviteToken) window.location.href = '/home.html';

  async function loadInvite() {
    try {
      const res = await fetch(`/rooms/invite/${inviteToken}`);
      if (!res.ok) { showError('邀请链接无效或已过期'); return; }
      const data = await res.json();
      renderInvite(data.inviterNickname);
    } catch (e) { showError('加载失败，请重试'); }
  }

  function renderInvite(inviterName) {
    const card = document.getElementById('invite-card');
    const initial = inviterName[0].toUpperCase();
    const isLoggedIn = !!token;
    card.innerHTML = `
      <div class="invite-avatar">${initial}</div>
      <div class="invite-title">${escHtml(inviterName)} 邀请你加入</div>
      <div class="inviter-name">${escHtml(inviterName)}</div>
      <p style="color:#999;font-size:0.88rem;margin-bottom:24px">的 BridgeIt 对话空间</p>
      <div class="error" id="error-msg"></div>
      ${isLoggedIn
        ? `<button class="btn-primary" onclick="joinRoom()">接受邀请</button>`
        : `<button class="btn-primary" onclick="goRegister()">注册并加入</button>
           <button class="btn-primary blue btn-gap" onclick="goLogin()">已有账号？登录</button>`
      }`;
  }

  async function joinRoom() {
    try {
      const res = await fetch('/rooms/join', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', Authorization: 'Bearer ' + token },
        body: JSON.stringify({ token: inviteToken }),
      });
      const data = await res.json();
      if (!res.ok) { showError(data.error || '加入失败'); return; }
      localStorage.setItem('bridgeit_current_room', data.roomId);
      localStorage.setItem('bridgeit_partner_name', data.partner?.nickname || '对方');
      window.location.href = '/chat.html';
    } catch (e) { showError('网络错误'); }
  }

  function goRegister() {
    localStorage.setItem('bridgeit_pending_invite', inviteToken);
    window.location.href = '/register.html';
  }
  function goLogin() {
    localStorage.setItem('bridgeit_pending_invite', inviteToken);
    window.location.href = '/login.html';
  }

  function showError(msg) {
    const el = document.getElementById('error-msg');
    if (el) { el.textContent = msg; el.style.display = 'block'; }
    else { document.getElementById('invite-card').innerHTML = `<p style="color:#F44336">${escHtml(msg)}</p>`; }
  }
  function escHtml(t) { const d = document.createElement('div'); d.textContent = t; return d.innerHTML; }

  loadInvite();
</script>
</body>
</html>
