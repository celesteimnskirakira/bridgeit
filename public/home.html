<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BridgeIt</title>
  <link rel="manifest" href="/manifest.json">
  <link rel="stylesheet" href="/css/mobile.css">
  <style>
    :root { --mine-bubble-1: rgba(156,39,176,0.78); --mine-bubble-2: rgba(92,107,192,0.72); }
    body { background: var(--dark-bg); overflow: hidden; }

    /* Blobs */
    .bg-wrap { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
    .blob { position: absolute; border-radius: 50%; }
    .blob-purple { width: 320px; height: 320px; top: -80px; left: -80px; background: radial-gradient(circle, rgba(123,31,162,0.38) 0%, transparent 68%); animation: blobFloat1 16s ease-in-out infinite; }
    .blob-yellow { width: 280px; height: 280px; bottom: 60px; right: -60px; background: radial-gradient(circle, rgba(255,179,0,0.28) 0%, transparent 68%); animation: blobFloat2 20s ease-in-out infinite; }

    /* Topbar */
    .topbar { position: fixed; top: 0; left: 0; right: 0; height: 60px; background: rgba(13,13,26,0.75); backdrop-filter: blur(32px) saturate(180%); -webkit-backdrop-filter: blur(32px) saturate(180%); border-bottom: 1px solid rgba(255,255,255,0.07); display: flex; align-items: center; padding: 0 18px; gap: 12px; z-index: 100; }
    .topbar h1 { flex: 1; font-size: 1.2rem; font-weight: 800; letter-spacing: -0.5px; background: linear-gradient(135deg, #ce93d8 0%, #FFD54F 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    #avatar-btn { background: linear-gradient(135deg, var(--mine-bubble-1), var(--mine-bubble-2)); border: none; border-radius: 50%; width: 34px; height: 34px; display: flex; align-items: center; justify-content: center; cursor: pointer; padding: 0; }

    /* Main content */
    .main-content { position: fixed; top: 60px; left: 0; right: 0; bottom: 0; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 18px 14px 24px; z-index: 1; }

    /* Section title */
    .section-title { font-size: 0.65rem; font-weight: 700; color: rgba(255,255,255,0.3); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; padding-left: 2px; }

    /* Bento grid */
    .room-list { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

    /* Bento card */
    .room-item { background: rgba(255,255,255,0.06); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; padding: 16px 14px; cursor: pointer; transition: transform 0.15s, background 0.15s; display: flex; flex-direction: column; gap: 10px; }
    .room-item:active { transform: scale(0.97); background: rgba(255,255,255,0.09); }

    /* Connection visual */
    .connection-row { display: flex; align-items: center; justify-content: center; gap: 6px; }
    .conn-avatar { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 0.78rem; flex-shrink: 0; }
    .conn-avatar.mine-av { background: linear-gradient(135deg, var(--mine-bubble-1), var(--mine-bubble-2)); color: white; border: none; }
    .conn-avatar.them-av { background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.7); border: 1.5px solid rgba(255,255,255,0.15); }
    .conn-line { flex: 1; height: 1.5px; border-radius: 2px; max-width: 24px; background: linear-gradient(90deg, rgba(179,136,255,0.6), rgba(255,213,79,0.5)); }

    /* Card content */
    .room-info { display: flex; flex-direction: column; gap: 3px; }
    .room-name { font-size: 0.88rem; font-weight: 700; color: rgba(255,255,255,0.85); }
    .room-preview { font-size: 0.72rem; color: rgba(255,255,255,0.35); overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; line-height: 1.4; }
    .card-meta { display: flex; justify-content: space-between; align-items: flex-end; }
    .room-time { font-size: 0.62rem; color: rgba(255,255,255,0.22); }

    /* FAB */
    .fab { position: fixed; bottom: 24px; right: 20px; width: 52px; height: 52px; border-radius: 50%; background: linear-gradient(135deg, #9C27B0, #5C6BC0); color: white; border: none; font-size: 1.6rem; font-weight: 300; cursor: pointer; box-shadow: 0 6px 24px rgba(123,31,162,0.5); display: flex; align-items: center; justify-content: center; z-index: 50; transition: transform 0.15s; }
    .fab:active { transform: scale(0.93) rotate(45deg); }

    /* Empty / onboarding */
    .empty-state { text-align: center; padding: 60px 24px; color: rgba(255,255,255,0.25); }
    .empty-state h3 { font-size: 1.05rem; margin-bottom: 8px; color: rgba(255,255,255,0.35); }

    .onboarding-card { margin: 8px 0; background: rgba(255,255,255,0.06); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; padding: 24px 20px; box-shadow: 0 4px 28px rgba(0,0,0,0.2); }
    .onboarding-title { font-size: 1.05rem; font-weight: 700; color: rgba(255,255,255,0.85); margin-bottom: 20px; text-align: center; }
    .onboarding-step { display: flex; align-items: flex-start; gap: 14px; margin-bottom: 18px; }
    .onboarding-step:last-child { margin-bottom: 0; }
    .step-num { width: 28px; height: 28px; border-radius: 50%; background: rgba(156,39,176,0.2); border: 1px solid rgba(179,136,255,0.3); color: #ce93d8; font-weight: 700; font-size: 0.82rem; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
    .step-body { flex: 1; }
    .step-label { font-size: 0.82rem; color: rgba(255,255,255,0.4); margin-bottom: 4px; }
    .step-content { font-size: 0.9rem; color: rgba(255,255,255,0.75); line-height: 1.4; }
    .contact-id-chip { display: inline-flex; align-items: center; gap: 6px; background: rgba(156,39,176,0.2); border: 1px solid rgba(179,136,255,0.3); color: #ce93d8; border-radius: 20px; padding: 4px 12px; font-weight: 700; font-size: 0.9rem; cursor: pointer; border: none; margin-top: 4px; transition: opacity 0.15s; }
    .contact-id-chip:active { opacity: 0.7; }
    .step-action { display: inline-flex; align-items: center; gap: 6px; color: #ce93d8; font-size: 0.88rem; font-weight: 600; cursor: pointer; margin-top: 6px; background: none; border: none; padding: 0; font-family: inherit; }

    /* Settings drawer */
    .settings-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px); z-index: 200; }
    .settings-overlay.open { display: block; }
    .settings-drawer { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(18,18,32,0.95); backdrop-filter: blur(40px); -webkit-backdrop-filter: blur(40px); border: 1px solid rgba(255,255,255,0.1); border-bottom: none; border-radius: 24px 24px 0 0; padding: 16px 20px 40px; z-index: 201; }
    .drawer-handle { width: 40px; height: 4px; background: rgba(255,255,255,0.2); border-radius: 2px; margin: 0 auto 20px; }
    .settings-drawer h3 { font-size: 1rem; margin-bottom: 20px; color: rgba(255,255,255,0.85); }
    .lang-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
    .lang-btn { padding: 12px; border: 1px solid rgba(255,255,255,0.1); border-radius: 10px; background: rgba(255,255,255,0.05); font-size: 0.88rem; cursor: pointer; transition: all 0.15s; color: rgba(255,255,255,0.6); font-family: inherit; }
    .lang-btn.selected { border-color: rgba(179,136,255,0.5); background: rgba(156,39,176,0.15); color: #ce93d8; font-weight: 600; }
    .logout-btn { width: 100%; padding: 12px; background: none; border: 1px solid rgba(255,255,255,0.12); border-radius: 10px; color: rgba(255,255,255,0.4); font-size: 0.9rem; cursor: pointer; font-family: inherit; }

    /* Profile section in settings drawer */
    .profile-section { display:flex; align-items:center; gap:14px; margin-bottom:20px; padding:14px 16px; background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.08); border-radius:16px; }
    .profile-avatar { width:48px; height:48px; border-radius:50%; background:linear-gradient(135deg, var(--mine-bubble-1), var(--mine-bubble-2)); display:flex; align-items:center; justify-content:center; font-weight:800; font-size:1.2rem; color:white; flex-shrink:0; }
    .profile-info { flex:1; min-width:0; }
    .profile-name { font-size:0.95rem; font-weight:700; color:rgba(255,255,255,0.85); margin-bottom:6px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .profile-id-btn { display:inline-flex; align-items:center; gap:6px; background:rgba(156,39,176,0.15); border:1px solid rgba(179,136,255,0.3); color:#ce93d8; border-radius:20px; padding:5px 12px; font-size:0.82rem; cursor:pointer; font-family:inherit; transition:opacity 0.15s; }
    .profile-id-btn:active { opacity:0.7; }

    /* Add friend drawer */
    .add-friend-drawer { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(18,18,32,0.95); backdrop-filter: blur(40px); -webkit-backdrop-filter: blur(40px); border: 1px solid rgba(255,255,255,0.1); border-bottom: none; border-radius: 24px 24px 0 0; padding: 16px 20px 40px; z-index: 201; }
    .add-friend-drawer h3 { font-size: 1rem; margin-bottom: 16px; color: rgba(255,255,255,0.85); }
    .add-friend-error { color: rgba(244,67,54,0.9); font-size: 0.82rem; margin-top: 8px; display: none; }
    .input-field { width: 100%; padding: 12px 16px; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; font-size: 0.95rem; outline: none; color: rgba(255,255,255,0.85); font-family: inherit; }
    .input-field:focus { border-color: rgba(179,136,255,0.4); background: rgba(255,255,255,0.1); }
    .input-field::placeholder { color: rgba(255,255,255,0.25); }
    .btn-primary { width: 100%; padding: 14px; background: linear-gradient(135deg, #9C27B0, #5C6BC0); color: white; border: none; border-radius: 12px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: opacity 0.2s; box-shadow: 0 4px 20px rgba(123,31,162,0.4); font-family: inherit; margin-top: 0; }
    .btn-primary:active { opacity: 0.85; }
  </style>
</head>
<body>

<div class="bg-wrap">
  <div class="blob blob-purple"></div>
  <div class="blob blob-yellow"></div>
</div>

<div class="topbar">
  <h1>BridgeIt</h1>
  <button onclick="openSettings()" id="avatar-btn">👤</button>
</div>

<div class="desktop-shell">
  <div class="sidebar">
    <div class="main-content">
      <div id="section-title-wrap"></div>
      <div class="room-list" id="room-list">
        <div class="empty-state">
          <h3 data-i18n="no_conversations">还没有对话</h3>
          <p data-i18n="add_friend_hint">点右下角 + 添加好友</p>
        </div>
      </div>
    </div>
    <button class="fab" onclick="openAddFriend()">+</button>
  </div>
  <div class="main-panel" id="main-panel">
    <div class="welcome-placeholder" id="welcome-placeholder">
      <div class="wp-icon">🌉</div>
      <div class="wp-title">BridgeIt</div>
      <div class="wp-hint">选择一个对话开始</div>
    </div>
    <iframe id="chat-frame" class="chat-frame" style="display:none"></iframe>
  </div>
</div>

<!-- 设置抽屉 -->
<div class="settings-overlay" id="settings-overlay" onclick="closeSettings()">
  <div class="settings-drawer" onclick="event.stopPropagation()">
    <div class="drawer-handle"></div>
    <div class="profile-section">
      <div class="profile-avatar" id="settings-avatar"></div>
      <div class="profile-info">
        <div class="profile-name" id="settings-nickname"></div>
        <button class="profile-id-btn" id="settings-copy-btn" onclick="copyMyId()">
          <span id="settings-contact-id"></span>
          <svg viewBox="0 0 16 16" width="12" height="12" fill="none"><rect x="5" y="5" width="9" height="9" rx="1.5" stroke="currentColor" stroke-width="1.5"/><path d="M3 11V3a1 1 0 0 1 1-1h8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        </button>
      </div>
    </div>
    <h3 data-i18n="interface_language">界面语言</h3>
    <div class="lang-grid" id="lang-grid">
      <button class="lang-btn" data-lang="zh" onclick="setLang('zh')">🇨🇳 中文</button>
      <button class="lang-btn" data-lang="en" onclick="setLang('en')">🇺🇸 English</button>
      <button class="lang-btn" data-lang="es" onclick="setLang('es')">🇪🇸 Español</button>
      <button class="lang-btn" data-lang="ru" onclick="setLang('ru')">🇷🇺 Русский</button>
      <button class="lang-btn" data-lang="fr" onclick="setLang('fr')">🇫🇷 Français</button>
    </div>
    <button class="logout-btn" onclick="logout()" data-i18n="logout">退出登录</button>
  </div>
</div>

<!-- 添加好友抽屉 -->
<div class="settings-overlay" id="add-friend-overlay" onclick="closeAddFriend()">
  <div class="add-friend-drawer" onclick="event.stopPropagation()">
    <div class="drawer-handle"></div>
    <h3 data-i18n="add_friend">添加好友</h3>
    <input type="text" id="add-contact-input" class="input-field" data-i18n-ph="contact_id_ph" placeholder="对方的联系号" autocomplete="off">
    <div class="add-friend-error" id="add-friend-error"></div>
    <button class="btn-primary" style="margin-top:16px;" id="add-friend-btn" onclick="doAddFriend()" data-i18n="confirm_add">确认添加</button>
  </div>
</div>

<script src="/js/i18n.js?v=3"></script>
<script>
  const token = localStorage.getItem('bridgeit_token');
  const user = JSON.parse(localStorage.getItem('bridgeit_user') || '{}');
  if (!token) window.location.href = '/login.html';

  // Apply mine bubble color from saved preference
  (function() {
    const hex = localStorage.getItem('bridgeit_mine_color') || '#9C27B0';
    const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
    const r2 = Math.round(r*.6+92*.4), g2 = Math.round(g*.6+107*.4), b2 = Math.round(b*.6+192*.4);
    document.documentElement.style.setProperty('--mine-bubble-1', `rgba(${r},${g},${b},0.78)`);
    document.documentElement.style.setProperty('--mine-bubble-2', `rgba(${r2},${g2},${b2},0.72)`);
  })();

  // Avatar: SVG person icon
  document.getElementById('avatar-btn').innerHTML = '<svg viewBox="0 0 24 24" width="17" height="17" fill="rgba(255,255,255,0.92)"><circle cx="12" cy="7.5" r="4.5"/><path d="M3 22c0-4.97 4.03-9 9-9s9 4.03 9 9" fill="rgba(255,255,255,0.92)"/></svg>';

  applyI18n();

  async function loadRooms() {
    try {
      const res = await fetch('/rooms', { headers: { Authorization: 'Bearer ' + token } });
      if (!res.ok) { logout(); return; }
      renderRooms(await res.json());
    } catch (e) { console.error(e); }
  }

  function renderRooms(rooms) {
    const list = document.getElementById('room-list');
    if (rooms.length === 0) {
      const cid = user.contactId ? '#' + user.contactId : '';
      list.innerHTML = `
    <div class="onboarding-card">
      <div class="onboarding-title">${escHtml(T('welcome_title'))}</div>
      <div class="onboarding-step">
        <div class="step-num">1</div>
        <div class="step-body">
          <div class="step-label">${escHtml(T('your_contact_id'))}</div>
          <button class="contact-id-chip" onclick="copyContactId(this, '${escHtml(user.contactId || '')}')">
            ${escHtml(cid)} <span>📋</span>
          </button>
        </div>
      </div>
      <div class="onboarding-step">
        <div class="step-num">2</div>
        <div class="step-body">
          <div class="step-content">${escHtml(T('share_hint'))}</div>
        </div>
      </div>
      <div class="onboarding-step">
        <div class="step-num">3</div>
        <div class="step-body">
          <div class="step-content">${escHtml(T('add_hint'))}</div>
          <button class="step-action" onclick="openAddFriend()">+ ${escHtml(T('add_friend'))}</button>
        </div>
      </div>
    </div>`;
      return;
    }
    const myInitial = (user.nickname || user.contactId || '?')[0].toUpperCase();
    // Show section title
    document.getElementById('section-title-wrap').innerHTML =
      `<div class="section-title">对话</div>`;
    list.innerHTML = rooms.map(room => {
      const name = room.partner?.nickname || '...';
      const theirInitial = name[0].toUpperCase();
      const preview = room.lastMessage?.text ? escHtml(room.lastMessage.text.slice(0, 40)) : escHtml(T('start_chat'));
      const time = room.lastMessage?.timestamp ? formatTime(room.lastMessage.timestamp) : '';
      return `<div class="room-item" data-room="${room.id}" onclick="enterRoom('${room.id}', '${escHtml(name)}')">
        <div class="connection-row">
          <div class="conn-avatar mine-av">${myInitial}</div>
          <div class="conn-line"></div>
          <div class="conn-avatar them-av">${theirInitial}</div>
        </div>
        <div class="room-info">
          <div class="room-name">${escHtml(name)}</div>
          <div class="room-preview">${preview}</div>
        </div>
        <div class="card-meta">
          <div class="room-time">${time}</div>
        </div>
      </div>`;
    }).join('');
  }

  function enterRoom(roomId, partnerName) {
    localStorage.setItem('bridgeit_current_room', roomId);
    localStorage.setItem('bridgeit_partner_name', partnerName);
    if (window.innerWidth >= 768) {
      document.getElementById('welcome-placeholder').style.display = 'none';
      const frame = document.getElementById('chat-frame');
      frame.style.display = 'block';
      frame.src = '/chat.html?room=' + encodeURIComponent(roomId) + '&embedded=1';
      document.querySelectorAll('.room-item').forEach(el => el.classList.remove('active'));
      const activeEl = document.querySelector(`.room-item[data-room="${roomId}"]`);
      if (activeEl) activeEl.classList.add('active');
    } else {
      window.location.href = '/chat.html';
    }
  }

  function openAddFriend() {
    document.getElementById('add-contact-input').value = '';
    document.getElementById('add-friend-error').style.display = 'none';
    document.getElementById('add-friend-overlay').classList.add('open');
    setTimeout(() => document.getElementById('add-contact-input').focus(), 100);
  }
  function closeAddFriend() { document.getElementById('add-friend-overlay').classList.remove('open'); }

  async function doAddFriend() {
    const contactId = document.getElementById('add-contact-input').value.trim();
    const errEl = document.getElementById('add-friend-error');
    errEl.style.display = 'none';
    if (!contactId) { errEl.textContent = T('enter_contact'); errEl.style.display = 'block'; return; }

    const btn = document.getElementById('add-friend-btn');
    btn.disabled = true; btn.textContent = T('adding');
    try {
      const res = await fetch('/rooms/add', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', Authorization: 'Bearer ' + token },
        body: JSON.stringify({ contactId }),
      });
      const data = await res.json();
      if (!res.ok) { errEl.textContent = data.error || T('add_failed'); errEl.style.display = 'block'; return; }
      closeAddFriend();
      localStorage.setItem('bridgeit_current_room', data.roomId);
      localStorage.setItem('bridgeit_partner_name', data.partner?.nickname || '...');
      window.location.href = '/chat.html';
    } catch (e) {
      errEl.textContent = T('network_error'); errEl.style.display = 'block';
    } finally {
      btn.disabled = false; btn.textContent = T('confirm_add');
    }
  }

  function openSettings() {
    document.getElementById('settings-overlay').classList.add('open');
    const lang = getLang();
    document.querySelectorAll('.lang-btn').forEach(btn => {
      btn.classList.toggle('selected', btn.dataset.lang === lang);
    });
    // Fill profile info
    const initial = (user.nickname || user.contactId || '?')[0].toUpperCase();
    document.getElementById('settings-avatar').textContent = initial;
    document.getElementById('settings-nickname').textContent = user.nickname || user.contactId || '';
    document.getElementById('settings-contact-id').textContent = '#' + (user.contactId || '');
  }
  function closeSettings() { document.getElementById('settings-overlay').classList.remove('open'); }

  function copyMyId() {
    navigator.clipboard.writeText(user.contactId || '').then(() => {
      const idSpan = document.getElementById('settings-contact-id');
      const orig = idSpan.textContent;
      idSpan.textContent = '已复制 ✓';
      setTimeout(() => { idSpan.textContent = orig; }, 1500);
    }).catch(() => {});
  }

  async function setLang(lang) {
    localStorage.setItem('bridgeit_lang', lang);
    user.language = lang;
    localStorage.setItem('bridgeit_user', JSON.stringify(user));
    applyI18n();
    document.querySelectorAll('.lang-btn').forEach(btn => {
      btn.classList.toggle('selected', btn.dataset.lang === lang);
    });
    // Re-render dynamic content in new language
    loadRooms();
    try {
      await fetch('/auth/profile', {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json', Authorization: 'Bearer ' + token },
        body: JSON.stringify({ language: lang }),
      });
    } catch (e) {}
  }

  function logout() {
    localStorage.removeItem('bridgeit_token');
    localStorage.removeItem('bridgeit_user');
    window.location.href = '/login.html';
  }

  function formatTime(ts) {
    const d = new Date(ts), now = new Date();
    if (d.toDateString() === now.toDateString()) {
      return d.getHours().toString().padStart(2,'0') + ':' + d.getMinutes().toString().padStart(2,'0');
    }
    return (d.getMonth()+1) + '/' + d.getDate();
  }

  function escHtml(t) { const d = document.createElement('div'); d.textContent = t; return d.innerHTML; }

  function copyContactId(btn, id) {
    navigator.clipboard.writeText(id).then(() => {
      const orig = btn.innerHTML;
      btn.innerHTML = escHtml(T('copied'));
      setTimeout(() => { btn.innerHTML = orig; }, 1500);
    }).catch(() => {});
  }

  loadRooms();
  setInterval(loadRooms, 30000);
</script>
</body>
</html>
