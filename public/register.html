<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BridgeIt - 注册</title>
  <link rel="manifest" href="/manifest.json">
  <link rel="stylesheet" href="/css/mobile.css">
  <style>
    .login-wrap {
      min-height: 100vh; display: flex; flex-direction: column;
      align-items: center; justify-content: center; padding: 24px;
      background: linear-gradient(135deg, #7B1FA2 0%, #1976D2 100%);
    }
    .login-card { background: white; border-radius: 24px; padding: 36px 28px; width: 100%; max-width: 380px; }
    .logo { font-size: 2rem; font-weight: 700; text-align: center; margin-bottom: 4px;
      background: linear-gradient(135deg, #7B1FA2, #1976D2);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .slogan { text-align: center; color: #999; font-size: 0.85rem; margin-bottom: 28px; }
    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; font-size: 0.85rem; color: #666; margin-bottom: 6px; }
    .error { color: #F44336; font-size: 0.82rem; margin-bottom: 12px; display: none; }
    .switch-link { text-align: center; margin-top: 16px; font-size: 0.88rem; color: #888; }
    .switch-link a { color: #7B1FA2; text-decoration: none; font-weight: 600; }
    .contact-hint { font-size: 0.78rem; margin-top: 4px; }
    .contact-hint.available { color: #4CAF50; }
    .contact-hint.taken { color: #F44336; }
    .contact-hint.hint { color: #999; }
  </style>
</head>
<body>
<div class="login-wrap">
  <div class="login-card">
    <div class="logo">BridgeIt</div>
    <div class="slogan">理解互相，舍弃对错</div>
    <div class="form-group">
      <label>昵称</label>
      <input type="text" id="nickname" class="input-field" placeholder="你的名字" autocomplete="nickname">
    </div>
    <div class="form-group">
      <label>联系号</label>
      <input type="text" id="contactId" class="input-field" placeholder="字母或数字，3-20位" autocomplete="username" oninput="checkContactId()">
      <div class="contact-hint hint" id="contact-hint">只允许字母和数字，3-20位</div>
    </div>
    <div class="form-group">
      <label>PIN 码</label>
      <input type="password" id="pin" class="input-field" placeholder="至少4位" autocomplete="new-password">
    </div>
    <div class="error" id="error-msg"></div>
    <button class="btn-primary" id="reg-btn" onclick="doRegister()">创建账号</button>
    <div class="switch-link">已有账号？<a href="/login.html">登录</a></div>
  </div>
</div>
<script>
  if (localStorage.getItem('bridgeit_token')) window.location.href = '/home.html';

  let checkTimer = null;
  let contactIdAvailable = false;

  function checkContactId() {
    clearTimeout(checkTimer);
    const contactId = document.getElementById('contactId').value.trim();
    const hint = document.getElementById('contact-hint');
    if (!contactId) {
      hint.textContent = '只允许字母和数字，3-20位';
      hint.className = 'contact-hint hint';
      contactIdAvailable = false;
      return;
    }
    if (!/^[a-zA-Z0-9]{3,20}$/.test(contactId)) {
      hint.textContent = '只允许字母和数字，3-20位';
      hint.className = 'contact-hint taken';
      contactIdAvailable = false;
      return;
    }
    hint.textContent = '检查中...';
    hint.className = 'contact-hint hint';
    checkTimer = setTimeout(async () => {
      try {
        const res = await fetch(`/auth/check/${encodeURIComponent(contactId)}`);
        const data = await res.json();
        if (data.available) {
          hint.textContent = '✓ 可用';
          hint.className = 'contact-hint available';
          contactIdAvailable = true;
        } else {
          hint.textContent = '✗ 已被使用';
          hint.className = 'contact-hint taken';
          contactIdAvailable = false;
        }
      } catch (e) {
        hint.textContent = '检查失败';
        hint.className = 'contact-hint hint';
      }
    }, 400);
  }

  async function doRegister() {
    const nickname = document.getElementById('nickname').value.trim();
    const contactId = document.getElementById('contactId').value.trim();
    const pin = document.getElementById('pin').value;
    if (!nickname || !contactId || !pin) { showError('请填写所有字段'); return; }
    if (!/^[a-zA-Z0-9]{3,20}$/.test(contactId)) { showError('联系号只能包含字母和数字，3-20位'); return; }
    if (!contactIdAvailable) { showError('联系号不可用，请换一个'); return; }
    if (pin.length < 4) { showError('PIN码至少4位'); return; }

    const btn = document.getElementById('reg-btn');
    btn.disabled = true; btn.textContent = '注册中...';

    try {
      const res = await fetch('/auth/create', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ contactId, nickname, pin }),
      });
      const data = await res.json();
      if (!res.ok) { showError(data.error || '注册失败'); return; }
      localStorage.setItem('bridgeit_token', data.token);
      localStorage.setItem('bridgeit_user', JSON.stringify(data.user));
      window.location.href = '/home.html';
    } catch (e) {
      showError('网络错误，请重试');
    } finally {
      btn.disabled = false; btn.textContent = '创建账号';
    }
  }

  function showError(msg) {
    const el = document.getElementById('error-msg');
    el.textContent = msg; el.style.display = 'block';
  }
</script>
</body>
</html>
