<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BridgeIt - 注册</title>
  <link rel="manifest" href="/manifest.json">
  <link rel="stylesheet" href="/css/mobile.css">
  <style>
    body { background: var(--dark-bg); overflow: auto; }
    .bg-wrap { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
    .blob { position: absolute; border-radius: 50%; }
    .blob-purple { width: 320px; height: 320px; top: -80px; left: -80px; background: radial-gradient(circle, rgba(123,31,162,0.42) 0%, transparent 68%); animation: blobFloat1 16s ease-in-out infinite; }
    .blob-yellow { width: 280px; height: 280px; bottom: 40px; right: -80px; background: radial-gradient(circle, rgba(255,179,0,0.32) 0%, transparent 68%); animation: blobFloat2 20s ease-in-out infinite; }

    .login-wrap { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 24px; position: relative; z-index: 1; }
    .login-logo { font-size: 2.2rem; font-weight: 900; letter-spacing: -1px; margin-bottom: 6px; text-align: center; background: linear-gradient(135deg, #ce93d8 0%, #FFD54F 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .login-slogan { text-align: center; color: rgba(255,255,255,0.3); font-size: 0.82rem; margin-bottom: 36px; letter-spacing: 0.3px; }
    .login-card { background: rgba(255,255,255,0.07); backdrop-filter: blur(40px) saturate(180%); -webkit-backdrop-filter: blur(40px) saturate(180%); border: 1px solid rgba(255,255,255,0.12); border-radius: 28px; padding: 28px 24px; width: 100%; max-width: 380px; box-shadow: 0 20px 60px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.1); }

    .lang-strip { display: flex; justify-content: center; gap: 10px; margin-bottom: 24px; }
    .lang-strip-btn { width: 34px; height: 34px; border-radius: 50%; border: 2px solid transparent; background: rgba(255,255,255,0.06); font-size: 1.1rem; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.15s; }
    .lang-strip-btn.active { border-color: rgba(179,136,255,0.6); background: rgba(156,39,176,0.15); }

    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; font-size: 0.72rem; font-weight: 700; color: rgba(255,255,255,0.4); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 7px; }
    .input-field { width: 100%; padding: 12px 16px; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.1); border-radius: 14px; font-size: 0.92rem; outline: none; color: rgba(255,255,255,0.85); font-family: inherit; transition: border-color 0.2s, background 0.2s; }
    .input-field:focus { border-color: rgba(179,136,255,0.5); background: rgba(255,255,255,0.1); }
    .input-field::placeholder { color: rgba(255,255,255,0.2); }
    .contact-hint { font-size: 0.78rem; margin-top: 4px; }
    .contact-hint.available { color: rgba(105,240,174,0.8); }
    .contact-hint.taken { color: rgba(244,67,54,0.8); }
    .contact-hint.hint { color: rgba(255,255,255,0.3); }
    .error { color: rgba(244,67,54,0.9); font-size: 0.82rem; margin-bottom: 12px; display: none; }
    .btn-primary { width: 100%; padding: 14px; background: linear-gradient(135deg, #9C27B0, #5C6BC0); color: white; border: none; border-radius: 14px; font-size: 0.95rem; font-weight: 700; cursor: pointer; transition: opacity 0.2s; box-shadow: 0 6px 24px rgba(123,31,162,0.4); font-family: inherit; }
    .btn-primary:active { opacity: 0.85; }
    .switch-link { text-align: center; margin-top: 16px; font-size: 0.85rem; color: rgba(255,255,255,0.3); }
    .switch-link a { color: rgba(179,136,255,0.8); text-decoration: none; font-weight: 600; }
  </style>
</head>
<body>
<div class="bg-wrap">
  <div class="blob blob-purple"></div>
  <div class="blob blob-yellow"></div>
</div>
<div class="login-wrap">
  <div class="login-logo">BridgeIt</div>
  <div class="login-slogan" data-i18n="slogan">理解互相，舍弃对错</div>
  <div class="login-card">
    <div class="lang-strip" id="lang-strip">
      <button class="lang-strip-btn" data-lang="zh" onclick="switchLang('zh')">🇨🇳</button>
      <button class="lang-strip-btn" data-lang="en" onclick="switchLang('en')">🇺🇸</button>
      <button class="lang-strip-btn" data-lang="es" onclick="switchLang('es')">🇪🇸</button>
      <button class="lang-strip-btn" data-lang="ru" onclick="switchLang('ru')">🇷🇺</button>
      <button class="lang-strip-btn" data-lang="fr" onclick="switchLang('fr')">🇫🇷</button>
    </div>
    <div class="form-group">
      <label data-i18n="nickname">昵称</label>
      <input type="text" id="nickname" class="input-field" placeholder="..." autocomplete="nickname">
    </div>
    <div class="form-group">
      <label data-i18n="contact_id">联系号</label>
      <input type="text" id="contactId" class="input-field" placeholder="your_id" data-i18n-ph="contact_id_own_ph" autocomplete="username" oninput="checkContactId()">
      <div class="contact-hint hint" id="contact-hint" data-i18n="contact_hint">只允许字母和数字，3-20位</div>
    </div>
    <div class="form-group">
      <label data-i18n="pin">PIN 码</label>
      <input type="password" id="pin" class="input-field" placeholder="••••" autocomplete="new-password">
    </div>
    <div class="error" id="error-msg"></div>
    <button class="btn-primary" id="reg-btn" onclick="doRegister()" data-i18n="create_account">创建账号</button>
    <div class="switch-link"><span data-i18n="have_account">已有账号？</span><a href="/login.html" data-i18n="login_link">登录</a></div>
  </div>
</div>
<script src="/js/i18n.js"></script>
<script>
  if (localStorage.getItem('bridgeit_token')) window.location.href = '/home.html';
  applyI18n();

  function updateLangStrip() {
    const cur = getLang();
    document.querySelectorAll('.lang-strip-btn').forEach(btn => {
      btn.classList.toggle('active', btn.dataset.lang === cur);
    });
  }

  function switchLang(code) {
    localStorage.setItem('bridgeit_lang', code);
    applyI18n();
    updateLangStrip();
  }

  updateLangStrip();

  let checkTimer = null;
  let contactIdAvailable = false;

  function checkContactId() {
    clearTimeout(checkTimer);
    const contactId = document.getElementById('contactId').value.trim();
    const hint = document.getElementById('contact-hint');
    if (!contactId) {
      hint.textContent = T('contact_hint'); hint.className = 'contact-hint hint';
      contactIdAvailable = false; return;
    }
    if (!/^[a-zA-Z0-9]{3,20}$/.test(contactId)) {
      hint.textContent = T('contact_hint'); hint.className = 'contact-hint taken';
      contactIdAvailable = false; return;
    }
    hint.textContent = T('checking'); hint.className = 'contact-hint hint';
    checkTimer = setTimeout(async () => {
      try {
        const res = await fetch(`/auth/check/${encodeURIComponent(contactId)}`);
        const data = await res.json();
        if (data.available) {
          hint.textContent = T('available'); hint.className = 'contact-hint available'; contactIdAvailable = true;
        } else {
          hint.textContent = T('taken'); hint.className = 'contact-hint taken'; contactIdAvailable = false;
        }
      } catch (e) { hint.textContent = T('check_failed'); hint.className = 'contact-hint hint'; }
    }, 400);
  }

  async function doRegister() {
    const nickname = document.getElementById('nickname').value.trim();
    const contactId = document.getElementById('contactId').value.trim();
    const pin = document.getElementById('pin').value;
    if (!nickname || !contactId || !pin) { showError(T('fill_all')); return; }
    if (!/^[a-zA-Z0-9]{3,20}$/.test(contactId)) { showError(T('invalid_contact')); return; }
    if (!contactIdAvailable) { showError(T('contact_unavailable')); return; }
    if (pin.length < 4) { showError(T('pin_too_short')); return; }

    const btn = document.getElementById('reg-btn');
    btn.disabled = true; btn.textContent = T('registering');
    try {
      const res = await fetch('/auth/create', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ contactId, nickname, pin }),
      });
      const data = await res.json();
      if (!res.ok) { showError(data.error || T('register_failed')); return; }
      localStorage.setItem('bridgeit_token', data.token);
      localStorage.setItem('bridgeit_user', JSON.stringify(data.user));
      if (data.user.language) localStorage.setItem('bridgeit_lang', data.user.language);
      window.location.href = '/home.html';
    } catch (e) { showError(T('network_error')); }
    finally { btn.disabled = false; btn.textContent = T('create_account'); }
  }

  function showError(msg) { const el = document.getElementById('error-msg'); el.textContent = msg; el.style.display = 'block'; }
</script>
</body>
</html>
