<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BridgeIt</title>
  <link rel="manifest" href="/manifest.json">
  <link rel="stylesheet" href="/css/mobile.css">
  <style>
    :root {
      --mine-bubble-1: rgba(156,39,176,0.78); --mine-bubble-2: rgba(92,107,192,0.72);
      --mine-bubble-border: rgba(179,136,255,0.32); --mine-bubble-shadow: rgba(123,31,162,0.3);
    }
    body { background: var(--dark-bg); overflow: hidden; }

    /* ── Background blobs ── */
    .bg-wrap { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
    .blob { position: absolute; border-radius: 50%; }
    .blob-purple { width: 350px; height: 350px; top: -100px; left: -80px; background: radial-gradient(circle, rgba(123,31,162,0.42) 0%, transparent 68%); animation: blobFloat1 16s ease-in-out infinite; }
    .blob-yellow { width: 300px; height: 300px; bottom: 40px; right: -80px; background: radial-gradient(circle, rgba(255,179,0,0.32) 0%, transparent 68%); animation: blobFloat2 20s ease-in-out infinite; }

    /* ── Topbar ── */
    .topbar { position: fixed; top: 0; left: 0; right: 0; height: 64px; background: rgba(13,13,26,0.75); backdrop-filter: blur(32px) saturate(180%); -webkit-backdrop-filter: blur(32px) saturate(180%); border-bottom: 1px solid rgba(255,255,255,0.07); display: flex; align-items: center; padding: 0 18px; z-index: 100; gap: 0; }
    .back-btn { color: rgba(255,255,255,0.55); font-size: 1rem; background: none; border: none; cursor: pointer; flex-shrink: 0; padding-right: 10px; font-family: inherit; }
    .topbar-center { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 5px; }
    .topbar-name { color: white; font-weight: 700; font-size: 1.05rem; letter-spacing: -0.3px; }
    .topbar-dots { display: flex; align-items: center; gap: 5px; height: 8px; }
    .tdot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
    .tdot-mine { background: linear-gradient(135deg, #ce93d8, #7986cb); }
    .tdot-theirs { background: rgba(255,255,255,0.5); }
    .topbar-btn { background: none; border: none; font-size: 1rem; cursor: pointer; color: rgba(255,255,255,0.4); padding: 6px; }

    /* Heart chain progress — pure CSS hearts, no emoji */
    .heart-chain { display: flex; align-items: center; gap: 3px; }
    .heart-item { display:inline-block; width:13px; height:12px; position:relative; }
    .heart-item::before { content:''; display:block; width:100%; height:100%;
      clip-path: path('M 6.5 11 C 0 7 0 1.5 3.5 1 C 5 0.5 6 1.5 6.5 2.5 C 7 1.5 8 0.5 9.5 1 C 13 1.5 13 7 6.5 11 Z');
      background: rgba(255,255,255,0.18); transition: background 0.3s; }
    .heart-item.lit::before { background: var(--heart-color, #ff9eb5); }
    .heart-level { font-size: 0.6rem; font-weight: 700; margin-left: 3px; }
    @keyframes heartPulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.4)} }
    .heart-chain.leveling .heart-item { animation: heartPulse 0.2s ease 2; }

    /* Hug animation overlay */
    @keyframes slideInLeft  { from{transform:translateX(-80px);opacity:0} to{transform:translateX(0);opacity:1} }
    @keyframes slideInRight { from{transform:translateX(80px);opacity:0}  to{transform:translateX(0);opacity:1} }
    @keyframes hugPulse     { 0%,100%{transform:scale(1)} 50%{transform:scale(1.15)} }
    @keyframes flyHeart     { 0%{transform:translate(0,0) scale(1);opacity:1} 100%{transform:translate(var(--tx),var(--ty)) scale(0.5);opacity:0} }
    @keyframes overlayIn    { from{opacity:0} to{opacity:1} }
    @keyframes overlayOut   { from{opacity:1} to{opacity:0} }

    .hug-overlay { position:fixed; inset:0; z-index:999; background:rgba(13,13,26,0.75);
      display:flex; align-items:center; justify-content:center; gap:0; pointer-events:none;
      animation: overlayIn 0.15s ease forwards; }
    .hug-overlay.leaving { animation: overlayOut 0.2s ease forwards; }
    .hug-char { display:flex; flex-direction:column; align-items:center; gap:2px; }
    .hug-head { width:32px; height:32px; border-radius:50%; background:rgba(242,242,250,0.97); position:relative; }
    .hug-head::before,.hug-head::after { content:''; position:absolute; width:6px; height:4px;
      background:rgba(15,15,30,0.8); border-radius:50%; top:54%; transform:translateY(-50%); }
    .hug-head::before { left:22%; }
    .hug-head::after  { right:22%; }
    .hug-body { width:44px; height:46px; border-radius:50% 50% 40% 40% / 44% 44% 56% 56%;
      background:rgba(242,242,250,0.97); }
    .hug-char.left  { animation: slideInLeft  0.4s ease forwards; }
    .hug-char.right { animation: slideInRight 0.4s ease forwards; }
    .hug-char.hugging { animation: hugPulse 0.3s ease forwards; }
    .hug-heart { position:absolute; width:14px; height:13px; animation: flyHeart 0.5s ease forwards; }
    .hug-heart::before { content:''; display:block; width:100%; height:100%;
      clip-path: path('M 7 12 C 0 8 0 1.5 3.5 1 C 5 0.5 6 1.5 7 2.5 C 8 1.5 9 0.5 10.5 1 C 14 1.5 14 8 7 12 Z');
      background: #ff9eb5; }

    /* ── Chat area ── */
    .chat-wrap { position: fixed; top: 64px; left: 0; right: 0; bottom: 60px; overflow-y: auto; padding: 14px 10px 6px; z-index: 1; -webkit-overflow-scrolling: touch; }

    /* Center spine */
    .chat-spine { position: absolute; left: 50%; top: 0; bottom: 0; width: 1px; transform: translateX(-50%); pointer-events: none; z-index: 0; background: linear-gradient(180deg, transparent 0%, rgba(156,39,176,0.18) 15%, rgba(180,80,180,0.15) 50%, rgba(255,179,0,0.15) 80%, transparent 100%); }

    /* Name labels */
    .nlabel { font-size: 0.6rem; margin-bottom: 3px; letter-spacing: 0.2px; position: relative; z-index: 1; padding: 0 2px; }
    .nlabel.mine { text-align: right; margin-right: calc(50% + 10px); color: rgba(179,136,255,0.5); }
    .nlabel.theirs { margin-left: calc(50% + 10px); color: rgba(255,255,255,0.28); }

    /* Message rows — Bridge Lane */
    .msg-row { display: flex; margin-bottom: 8px; align-items: flex-end; position: relative; z-index: 1; }
    .bubble { max-width: calc(48% - 10px); min-width: 60px; padding: 10px 14px; font-size: 0.9rem; line-height: 1.5; word-break: break-word; animation: fadeUp 0.25s ease; }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

    /* Mine: purple, LEFT side, right-aligned (near center) */
    .msg-row.mine { padding-right: calc(50% + 10px); }
    .mine .bubble { margin-left: auto; margin-right: 0; background: linear-gradient(140deg, var(--mine-bubble-1), var(--mine-bubble-2)); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border: 1px solid var(--mine-bubble-border); color: white; border-radius: 16px 16px 3px 16px; text-align: right; box-shadow: 0 4px 20px var(--mine-bubble-shadow); }
    .mine .msg-time { order: -1; margin-right: 6px; }
    /* Theirs: fixed frosted glass */
    .theirs .bubble { margin-left: calc(50% + 10px); background: rgba(255,255,255,0.09); backdrop-filter: blur(20px) saturate(160%); -webkit-backdrop-filter: blur(20px) saturate(160%); border: 1px solid rgba(255,255,255,0.18); color: rgba(255,255,255,0.88); border-radius: 16px 16px 16px 3px; box-shadow: 0 4px 20px rgba(0,0,0,0.15); }

    .msg-time { font-size: 0.65rem; color: rgba(255,255,255,0.3); margin-bottom: 3px; flex-shrink: 0; align-self: flex-end; }
    .translation-text { margin-top: 6px; padding-top: 5px; border-top: 1px solid rgba(255,255,255,0.12); font-size: 0.75rem; color: rgba(255,255,255,0.5); line-height: 1.4; }
    .mine .translation-text { border-top-color: rgba(179,136,255,0.2); }
    .translation-line { display: block; }

    /* ── Bridge AI Card (gold) ── */
    .bridge-card { margin: 8px 10px 12px; padding: 13px 15px; position: relative; z-index: 1; background: rgba(255,179,0,0.07); backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px); border: 1px solid rgba(255,179,0,0.22); border-radius: 18px; box-shadow: 0 4px 28px rgba(255,179,0,0.08); animation: fadeUp 0.3s ease; }
    .bridge-top { display: flex; align-items: center; gap: 9px; margin-bottom: 7px; }
    .bridge-orb { width: 26px; height: 26px; border-radius: 50%; flex-shrink: 0; background: linear-gradient(135deg, #FFD54F, #FFA000); display: flex; align-items: center; justify-content: center; font-size: 0.72rem; box-shadow: 0 0 12px rgba(255,179,0,0.4); }
    .bridge-lbl { font-size: 0.63rem; font-weight: 700; color: #FFD54F; text-transform: uppercase; letter-spacing: 0.8px; }
    .bridge-sub { font-size: 0.58rem; color: rgba(255,213,79,0.45); margin-top: 1px; }
    .bridge-text { font-size: 0.84rem; color: rgba(255,255,255,0.86); line-height: 1.55; margin-bottom: 6px; }
    .bridge-advice { margin-top: 6px; }
    .bridge-advice-item { font-size: 0.82rem; color: rgba(255,213,79,0.75); line-height: 1.5; padding: 2px 0; }
    .bridge-advice-item::before { content: '· '; }
    .bridge-kb { margin-top: 8px; padding: 9px 12px; background: rgba(255,255,255,0.04); border-radius: 10px; border-left: 2px solid rgba(255,179,0,0.3); }
    .kb-label { font-size: 0.62rem; font-weight: 700; color: rgba(255,213,79,0.6); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
    .kb-topic { font-size: 0.82rem; color: rgba(255,255,255,0.8); font-weight: 600; margin-bottom: 4px; }
    .kb-fact { font-size: 0.75rem; color: rgba(255,255,255,0.55); line-height: 1.4; margin-top: 3px; }
    .kb-fact::before { content: '· '; }

    /* Topic break */
    .topic-break { display: flex; align-items: center; margin: 16px 0; gap: 10px; position: relative; z-index: 1; }
    .topic-break-line { flex: 1; height: 1px; background: rgba(255,255,255,0.07); }
    .topic-break-label { font-size: 0.65rem; color: rgba(255,255,255,0.2); white-space: nowrap; padding: 0 4px; }

    /* Thinking indicator */
    .thinking-row { display: flex; margin-bottom: 8px; padding-left: calc(50% + 10px); position: relative; z-index: 1; }
    .thinking-bubble { background: rgba(255,255,255,0.08); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.12); border-radius: 16px 16px 16px 3px; padding: 10px 14px; }
    .dots span { display: inline-block; width: 6px; height: 6px; background: rgba(255,255,255,0.4); border-radius: 50%; margin: 0 2px; animation: dot 1.2s infinite; }
    .dots span:nth-child(2) { animation-delay: 0.2s; }
    .dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes dot { 0%,80%,100% { transform: scale(0.4); opacity: 0.3; } 40% { transform: scale(1); opacity: 1; } }

    /* Input bar */
    .input-bar { position: fixed; bottom: 0; left: 0; right: 0; min-height: 60px; background: rgba(13,13,26,0.8); backdrop-filter: blur(32px); -webkit-backdrop-filter: blur(32px); border-top: 1px solid rgba(255,255,255,0.07); display: flex; align-items: flex-end; padding: 8px 12px; padding-bottom: max(8px, env(safe-area-inset-bottom)); gap: 8px; z-index: 100; }
    .topic-btn { background: none; border: none; font-size: 1.1rem; cursor: pointer; color: rgba(255,255,255,0.2); padding: 8px; border-radius: 8px; flex-shrink: 0; align-self: flex-end; margin-bottom: 1px; transition: color 0.2s; }
    .topic-btn:active { color: rgba(179,136,255,0.7); }
    .chat-input { flex: 1; padding: 9px 14px; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.1); border-radius: 22px; font-size: 0.9rem; outline: none; color: rgba(255,255,255,0.85); resize: none; overflow-y: hidden; min-height: 38px; max-height: 120px; line-height: 1.4; font-family: inherit; display: block; box-sizing: border-box; }
    .chat-input::placeholder { color: rgba(255,255,255,0.25); }
    .chat-input:focus { border-color: rgba(179,136,255,0.4); background: rgba(255,255,255,0.1); }
    .send-btn { width: 38px; height: 38px; border-radius: 50%; background: linear-gradient(135deg, #9C27B0, #5C6BC0); color: white; border: none; font-size: 1rem; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: transform 0.1s; align-self: flex-end; box-shadow: 0 4px 16px rgba(123,31,162,0.5); }
    .send-btn:active { transform: scale(0.93); }
    .send-btn:disabled { opacity: 0.4; }

    /* Settings drawer */
    .drawer-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px); z-index: 200; }
    .drawer-overlay.open { display: block; }
    .drawer { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(18,18,32,0.95); backdrop-filter: blur(40px) saturate(180%); -webkit-backdrop-filter: blur(40px) saturate(180%); border: 1px solid rgba(255,255,255,0.1); border-bottom: none; border-radius: 24px 24px 0 0; padding: 16px 20px 40px; z-index: 201; max-height: 80vh; overflow-y: auto; }
    .drawer-handle { width: 40px; height: 4px; background: rgba(255,255,255,0.2); border-radius: 2px; margin: 0 auto 20px; }
    .drawer h3 { font-size: 1rem; margin-bottom: 16px; color: rgba(255,255,255,0.85); }
    .tl-section-label { font-size: 0.68rem; color: rgba(255,255,255,0.4); font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; margin-top: 4px; }
    .lang-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 16px; }
    .lang-btn { padding: 8px 6px; background: rgba(255,255,255,0.06); border: 1.5px solid rgba(255,255,255,0.1); border-radius: 10px; color: rgba(255,255,255,0.75); font-size: 0.8rem; cursor: pointer; font-family: inherit; transition: all 0.15s; text-align: center; }
    .lang-btn.selected { border-color: rgba(179,136,255,0.6); background: rgba(156,39,176,0.18); color: white; }
    .tl-order-list { margin-bottom: 16px; }
    .tl-item { display: flex; align-items: center; gap: 10px; padding: 11px 14px; background: rgba(255,179,0,0.08); border: 1px solid rgba(255,179,0,0.15); border-radius: 10px; margin-bottom: 6px; touch-action: none; user-select: none; }
    .drag-handle { color: rgba(255,213,79,0.4); font-size: 1.1rem; cursor: grab; flex-shrink: 0; line-height: 1; }
    .tl-lang-label { flex: 1; font-size: 0.88rem; color: rgba(255,255,255,0.75); }
    .tl-remove { background: none; border: none; color: rgba(255,213,79,0.3); font-size: 1.2rem; cursor: pointer; padding: 2px 4px; line-height: 1; flex-shrink: 0; }
    .tl-remove:active { color: rgba(244,67,54,0.8); }
    .tl-placeholder { background: rgba(255,179,0,0.05); border-radius: 10px; border: 2px dashed rgba(255,179,0,0.2); margin-bottom: 6px; }
    .tl-add-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 16px; }
    .tl-add-btn { padding: 10px 12px; border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; background: rgba(255,255,255,0.05); font-size: 0.82rem; cursor: pointer; text-align: left; color: rgba(255,255,255,0.6); font-family: inherit; }
    .tl-add-btn:active { background: rgba(255,255,255,0.09); }
    .tl-empty { color: rgba(255,255,255,0.25); font-size: 0.82rem; text-align: center; padding: 12px 0 4px; }
    .color-row { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; margin-top: 4px; }
    .color-row input[type=color] { width: 44px; height: 44px; border: 1px solid rgba(255,255,255,0.15); border-radius: 10px; cursor: pointer; padding: 2px; background: none; }
    .reset-color-btn { background: none; border: 1px solid rgba(255,255,255,0.12); border-radius: 8px; padding: 6px 12px; font-size: 0.82rem; color: rgba(255,255,255,0.4); cursor: pointer; font-family: inherit; }
    .btn-primary { width: 100%; padding: 14px; background: linear-gradient(135deg, #9C27B0, #5C6BC0); color: white; border: none; border-radius: 12px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: opacity 0.2s; box-shadow: 0 4px 20px rgba(123,31,162,0.4); font-family: inherit; }
    .btn-primary:active { opacity: 0.85; }
    .bridge-status { font-size: 0.65rem; color: rgba(255,213,79,0.5); margin-top: 3px; margin-right: calc(50% + 10px); text-align: right; opacity: 0; transition: opacity 0.4s; position: relative; z-index: 1; padding: 0 2px; }
    .bridge-status.visible { opacity: 1; }
    .bridge-status.dim { opacity: 0.3; }
    .bridge-moment { margin: 4px 10px 12px; padding: 13px 15px; position: relative; z-index: 1; background: rgba(92,107,192,0.1); backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px); border: 1px solid rgba(179,136,255,0.25); border-radius: 18px; box-shadow: 0 4px 20px rgba(92,107,192,0.1); animation: fadeUp 0.4s ease; }
    .bm-top { display: flex; align-items: center; gap: 9px; margin-bottom: 7px; }
    .bm-orb { width: 26px; height: 26px; border-radius: 50%; flex-shrink: 0; background: linear-gradient(135deg, #9C27B0, #5C6BC0); display: flex; align-items: center; justify-content: center; font-size: 0.8rem; box-shadow: 0 0 12px rgba(92,107,192,0.4); }
    .bm-lbl { font-size: 0.63rem; font-weight: 700; color: rgba(179,136,255,0.9); text-transform: uppercase; letter-spacing: 0.8px; }
    .bm-text { font-size: 0.84rem; color: rgba(255,255,255,0.82); line-height: 1.55; }
    .bm-time { font-size: 0.6rem; color: rgba(255,255,255,0.2); text-align: right; margin-top: 6px; }

    /* Mobile: wider bubbles, traditional layout */
    @media (max-width: 767px) {
      .bubble { max-width: 80%; }
      .msg-row.mine { padding-right: 10px; }
      .mine .bubble { max-width: 80%; }
      .theirs .bubble { margin-left: 10px; max-width: 80%; }
      .nlabel.mine { margin-right: 10px; }
      .nlabel.theirs { margin-left: 10px; }
    }
  </style>
</head>
<body>

<div class="bg-wrap">
  <div class="blob blob-purple"></div>
  <div class="blob blob-yellow"></div>
</div>

<div class="topbar">
  <button class="back-btn" onclick="window.location.href='/home.html'" data-i18n="back_btn">‹ 返回</button>
  <div class="topbar-center">
    <div class="topbar-name" id="partner-name">...</div>
    <div class="topbar-dots">
      <div class="tdot tdot-mine"></div>
      <div class="heart-chain" id="heart-chain">
        <span class="heart-item"></span>
        <span class="heart-item"></span>
        <span class="heart-item"></span>
        <span class="heart-item"></span>
        <span class="heart-item"></span>
        <span class="heart-level" id="heart-level"></span>
      </div>
      <div class="tdot tdot-theirs"></div>
    </div>
  </div>
  <button class="topbar-btn" onclick="openJournal()" title="Bridge 日志">📖</button>
  <button class="topbar-btn" onclick="openSettingsDrawer()" title="聊天设置">⚙️</button>
</div>

<div class="chat-wrap" id="chat-wrap">
  <div class="chat-spine"></div>
</div>

<div class="input-bar">
  <button class="topic-btn" onclick="sendTopicBreak()" title="新话题">↺</button>
  <textarea class="chat-input" id="chat-input" rows="1"
    data-i18n-ph="input_placeholder"
    onkeydown="handleKey(event)"
    oninput="autoGrow(this)"></textarea>
  <button class="send-btn" id="send-btn" onclick="sendMessage()">▶</button>
</div>

<div class="drawer-overlay" id="drawer-overlay" onclick="closeSettingsDrawer()">
  <div class="drawer" onclick="event.stopPropagation()">
    <div class="drawer-handle"></div>
    <h3 data-i18n="chat_settings">聊天设置</h3>
    <div id="translate-drawer-content"></div>
    <div class="tl-section-label" style="margin-top:20px">我的气泡颜色</div>
    <div class="color-row">
      <input type="color" id="mine-color-input" value="#9C27B0"
        oninput="applyMineColor(this.value)">
      <button class="reset-color-btn" onclick="resetMineColor()" data-i18n="reset_default">恢复默认</button>
    </div>
    <div class="tl-section-label" style="margin-top:20px" data-i18n="interface_language">界面语言</div>
    <div class="lang-grid" id="chat-lang-grid">
      <button class="lang-btn" data-lang="zh" onclick="setChatLang('zh')">🇨🇳 中文</button>
      <button class="lang-btn" data-lang="en" onclick="setChatLang('en')">🇺🇸 English</button>
      <button class="lang-btn" data-lang="es" onclick="setChatLang('es')">🇪🇸 Español</button>
      <button class="lang-btn" data-lang="ru" onclick="setChatLang('ru')">🇷🇺 Русский</button>
      <button class="lang-btn" data-lang="fr" onclick="setChatLang('fr')">🇫🇷 Français</button>
    </div>
    <button class="btn-primary" onclick="saveSettings()" data-i18n="save">保存</button>
  </div>
</div>

<script src="/js/i18n.js?v=3"></script>
<script src="/socket.io/socket.io.js"></script>
<script>
const LANGS = [
  { code: 'zh', label: '🇨🇳 中文' },
  { code: 'en', label: '🇺🇸 English' },
  { code: 'es', label: '🇪🇸 Español' },
  { code: 'ru', label: '🇷🇺 Русский' },
  { code: 'fr', label: '🇫🇷 Français' },
];

const token = localStorage.getItem('bridgeit_token');
const roomId = localStorage.getItem('bridgeit_current_room');
const partnerName = localStorage.getItem('bridgeit_partner_name') || '...';

const isEmbedded = new URLSearchParams(location.search).get('embedded') === '1';
if (isEmbedded) {
  document.querySelector('.back-btn').style.display = 'none';
}

if (!token || !roomId) window.location.href = '/home.html';

function getMyId() {
  try { return JSON.parse(atob(token.split('.')[1])).userId || null; } catch(e) { return null; }
}
const user = JSON.parse(localStorage.getItem('bridgeit_user') || '{}');
const myId = user.id || getMyId();

document.getElementById('partner-name').textContent = partnerName;
applyI18n();

function setChatLang(code) {
  localStorage.setItem('bridgeit_lang', code);
  applyI18n();
  updateChatLangGrid();
}

function updateChatLangGrid() {
  const cur = getLang();
  document.querySelectorAll('#chat-lang-grid .lang-btn').forEach(btn => {
    btn.classList.toggle('selected', btn.dataset.lang === cur);
  });
}

let translateTo = [];
let lastSenderId = null;
function applyMineColor(hex) {
  const r = parseInt(hex.slice(1,3), 16);
  const g = parseInt(hex.slice(3,5), 16);
  const b = parseInt(hex.slice(5,7), 16);
  const r2 = Math.round(r * 0.6 + 92 * 0.4);
  const g2 = Math.round(g * 0.6 + 107 * 0.4);
  const b2 = Math.round(b * 0.6 + 192 * 0.4);
  const root = document.documentElement;
  root.style.setProperty('--mine-bubble-1', `rgba(${r},${g},${b},0.78)`);
  root.style.setProperty('--mine-bubble-2', `rgba(${r2},${g2},${b2},0.72)`);
  root.style.setProperty('--mine-bubble-border', `rgba(${Math.min(r+80,255)},${Math.min(g+80,255)},${Math.min(b+80,255)},0.32)`);
  root.style.setProperty('--mine-bubble-shadow', `rgba(${r},${g},${b},0.3)`);
}

function loadMineColor() {
  const hex = localStorage.getItem('bridgeit_mine_color') || '#9C27B0';
  applyMineColor(hex);
}
loadMineColor();

function resetMineColor() {
  const hex = '#9C27B0';
  const el = document.getElementById('mine-color-input');
  if (el) el.value = hex;
  applyMineColor(hex);
}

// ── Heart Chain ─────────────────────────────────────────────────────────────
const HEART_COLORS = ['#ff9eb5','#ff4d6d','#FFD54F','#ce93d8','url(#rainbow)'];
const HEART_LEVEL_CHARS = ['①','②','③','④','⑤','⑥','⑦','⑧','⑨','⑩'];

function updateHeartChain(topicCount, animate) {
  const level    = Math.floor(topicCount / 5);
  const lit      = topicCount % 5;
  const colorIdx = Math.min(level, HEART_COLORS.length - 1);
  const color    = HEART_COLORS[colorIdx];
  const chain    = document.getElementById('heart-chain');
  const levelEl  = document.getElementById('heart-level');
  if (!chain) return;

  chain.style.setProperty('--heart-color', color);
  const hearts = chain.querySelectorAll('.heart-item');
  hearts.forEach((h, i) => h.classList.toggle('lit', i < lit));

  levelEl.textContent = level > 0 ? (HEART_LEVEL_CHARS[Math.min(level, 9)] || `L${level+1}`) : '';
  levelEl.style.color = color;

  if (animate && lit === 0 && topicCount > 0) {
    chain.classList.add('leveling');
    setTimeout(() => chain.classList.remove('leveling'), 500);
  }
}

function initHeartChain(topicCount) {
  updateHeartChain(topicCount || 0, false);
}

// ── Hug Animation ────────────────────────────────────────────────────────────
function showHugAnimation() {
  const overlay = document.createElement('div');
  overlay.className = 'hug-overlay';

  const scene = document.createElement('div');
  scene.style.cssText = 'display:flex; align-items:flex-end; justify-content:center; gap:6px; position:relative;';

  const left = document.createElement('div');
  left.className = 'hug-char left';
  left.innerHTML = `<div class="hug-head"></div><div class="hug-body"></div>`;

  const right = document.createElement('div');
  right.className = 'hug-char right';
  right.innerHTML = `<div class="hug-head"></div><div class="hug-body"></div>`;

  scene.appendChild(left);
  scene.appendChild(right);
  overlay.appendChild(scene);
  document.body.appendChild(overlay);

  setTimeout(() => {
    left.className  = 'hug-char hugging';
    right.className = 'hug-char hugging';
    scene.style.gap = '2px';

    // Crossed arms SVG between them
    const arms = document.createElement('div');
    arms.style.cssText = 'position:absolute; bottom:12px; left:50%; transform:translateX(-50%); pointer-events:none;';
    arms.innerHTML = `<svg viewBox="0 0 68 16" width="68" height="16" overflow="visible">
      <path d="M4 13 Q34 1 64 13" stroke="rgba(242,242,250,0.9)" stroke-width="5" fill="none" stroke-linecap="round"/>
      <path d="M4 3 Q34 15 64 3" stroke="rgba(242,242,250,0.75)" stroke-width="5" fill="none" stroke-linecap="round"/>
    </svg>`;
    scene.appendChild(arms);

    const dirs = [
      [-50,-60],[0,-70],[50,-60],[70,-20],[50,40],[0,60],[-50,40],[-70,-20]
    ];
    dirs.forEach(([tx, ty]) => {
      const h = document.createElement('div');
      h.className = 'hug-heart';
      h.style.cssText = `--tx:${tx}px; --ty:${ty}px; position:absolute; left:50%; top:50%; margin-left:-8px; margin-top:-8px;`;
      overlay.appendChild(h);
    });
  }, 400);

  setTimeout(() => overlay.classList.add('leaving'), 1000);
  setTimeout(() => overlay.remove(), 1200);
}

const socket = io({ auth: { token } });

socket.on('connect', async () => {
  await loadRoomConfig(); // must complete before rendering so translateTo order is correct
  socket.emit('join-room', roomId, ({ messages, error }) => {
    if (error) { window.location.href = '/home.html'; return; }
    messages.forEach(msg => renderItem(msg, false));
    messages.filter(m => m.analysis && !m.type && m.analysis.receiverId === myId)
      .forEach(m => renderAICard(m.analysis));
    scrollToBottom();
  });
});

socket.on('connect_error', () => window.location.href = '/login.html');
socket.on('new-message', msg => { if (msg.roomId === roomId) renderItem(msg, true); });
socket.on('ai-thinking', ({ roomId: rid, thinking }) => {
  if (rid !== roomId) return;
  if (thinking) showThinking(); else hideThinking();
});
socket.on('ai-analysis', analysis => {
  if (analysis.roomId !== roomId) return;
  hideThinking();
  attachTranslations(analysis);
  if (analysis.receiverId === myId) renderAICard(analysis);
  if (analysis.senderId === myId) renderBridgeStatus(analysis);
});
socket.on('ai-error', ({ roomId: rid }) => {
  if (rid === roomId) hideThinking();
});
socket.on('topic-break', msg => { if (msg.roomId === roomId) renderItem(msg, true); });
socket.on('topic-summary', data => {
  if (data.roomId !== roomId) return;
  renderBridgeMoment(data.summary, data.timestamp);
  if (data.topicCount != null) updateHeartChain(data.topicCount, true);
});

async function loadRoomConfig() {
  try {
    const res = await fetch('/rooms', { headers: { Authorization: 'Bearer ' + token } });
    if (!res.ok) return;
    const rooms = await res.json();
    const room = rooms.find(r => r.id === roomId);
    translateTo = room?.translateTo || [];
    if (room?.topicCount != null) initHeartChain(room.topicCount);
  } catch (e) {}
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}

function autoGrow(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

function sendMessage() {
  const input = document.getElementById('chat-input');
  const text = input.value.trim();
  if (!text) return;
  input.value = '';
  input.style.height = 'auto';
  input.focus();
  socket.emit('send-message', { roomId, text });
}

function sendTopicBreak() {
  if (!confirm(T('new_topic_dialog'))) return;
  showHugAnimation();
  socket.emit('new-topic-break', { roomId });
}

function renderItem(msg, animate) {
  if (msg.type === 'topic-break') {
    lastSenderId = null; // reset on topic break
    renderTopicBreak(animate);
    return;
  }
  const isMe = (msg.senderId === myId);
  const wrap = document.getElementById('chat-wrap');

  // Name label when sender changes
  if (msg.senderId !== lastSenderId) {
    const nlabel = document.createElement('div');
    nlabel.className = 'nlabel ' + (isMe ? 'mine' : 'theirs');
    nlabel.textContent = isMe ? (user.nickname || 'You') : partnerName;
    if (!animate) nlabel.style.animation = 'none';
    wrap.appendChild(nlabel);
    lastSenderId = msg.senderId;
  }

  const row = document.createElement('div');
  row.className = 'msg-row ' + (isMe ? 'mine' : 'theirs');
  if (!animate) row.style.animation = 'none';

  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.id = 'msg-' + msg.id;
  bubble.dataset.original = msg.text;

  let html = escHtml(msg.text);
  const translations = msg.translations || msg.analysis?.translations;
  if (translations) {
    const orderedLangs = translateTo.length > 0
      ? translateTo.filter(l => translations[l])
      : Object.keys(translations);
    const lines = orderedLangs
      .filter(lang => translations[lang] && translations[lang] !== msg.text)
      .map(lang => `<div class="translation-line">${escHtml(translations[lang])}</div>`);
    if (lines.length) html += `<div class="translation-text">${lines.join('')}</div>`;
  }

  bubble.innerHTML = html;
  row.appendChild(bubble);

  const time = document.createElement('div');
  time.className = 'msg-time';
  time.textContent = formatTime(msg.timestamp);
  row.appendChild(time);

  wrap.appendChild(row);
  if (animate) scrollToBottom();
}

function renderTopicBreak(animate) {
  const wrap = document.getElementById('chat-wrap');
  const div = document.createElement('div');
  div.className = 'topic-break';
  if (!animate) div.style.animation = 'none';
  div.innerHTML = `<div class="topic-break-line"></div><div class="topic-break-label">${escHtml(T('new_topic_label'))}</div><div class="topic-break-line"></div>`;
  wrap.appendChild(div);
  if (animate) scrollToBottom();
}

function attachTranslations(analysis) {
  if (!analysis.translations || !analysis.messageId) return;
  const bubble = document.getElementById('msg-' + analysis.messageId);
  if (!bubble || bubble.querySelector('.translation-text')) return;
  const original = bubble.dataset.original || '';
  const translations = analysis.translations;
  const orderedLangs = translateTo.length > 0
    ? translateTo.filter(l => translations[l])
    : Object.keys(translations);
  const lines = orderedLangs
    .filter(lang => translations[lang] && translations[lang] !== original)
    .map(lang => `<div class="translation-line">${escHtml(translations[lang])}</div>`);
  if (lines.length) {
    const div = document.createElement('div');
    div.className = 'translation-text';
    div.innerHTML = lines.join('');
    bubble.appendChild(div);
  }
}

function renderBridgeStatus(analysis) {
  const bubble = document.getElementById('msg-' + analysis.messageId);
  if (!bubble) return;
  const row = bubble.parentElement;
  if (!row) return;
  // 防止重复插入
  if (row.nextElementSibling?.classList?.contains('bridge-status')) return;
  const statusEl = document.createElement('div');
  statusEl.className = 'bridge-status';
  const insight = (analysis.insight || '').slice(0, 30);
  statusEl.textContent = '💡 Bridge 已建立 · ' + insight + (analysis.insight?.length > 30 ? '…' : '');
  row.insertAdjacentElement('afterend', statusEl);
  // fade in
  requestAnimationFrame(() => {
    requestAnimationFrame(() => statusEl.classList.add('visible'));
  });
  // dim after 3s
  setTimeout(() => {
    statusEl.classList.remove('visible');
    statusEl.classList.add('dim');
  }, 3000);
}

function renderBridgeMoment(summary, timestamp) {
  const wrap = document.getElementById('chat-wrap');
  const card = document.createElement('div');
  card.className = 'bridge-moment';
  const t = new Date(timestamp);
  const timeStr = `${String(t.getMonth()+1).padStart(2,'0')}-${String(t.getDate()).padStart(2,'0')} ${String(t.getHours()).padStart(2,'0')}:${String(t.getMinutes()).padStart(2,'0')}`;
  card.innerHTML = `
    <div class="bm-top">
      <div class="bm-orb">🌉</div>
      <div class="bm-lbl">Bridge Moment</div>
    </div>
    <div class="bm-text">${escHtml(summary)}</div>
    <div class="bm-time">${timeStr}</div>`;
  wrap.appendChild(card);
  scrollToBottom();
}

function openJournal() {
  window.location.href = '/journal.html?room=' + encodeURIComponent(roomId);
}

function renderAICard(analysis) {
  if (document.getElementById('ai-body-' + analysis.messageId)) return;
  const bubble = document.getElementById('msg-' + analysis.messageId);
  if (!bubble) return;
  const row = bubble.parentElement;
  if (!row) return;

  let bodyHtml = `
    <div class="bridge-top">
      <div class="bridge-orb">💡</div>
      <div>
        <div class="bridge-lbl">Bridge AI</div>
        <div class="bridge-sub">仅你可见</div>
      </div>
    </div>
    <div class="bridge-text">${escHtml(analysis.insight || '')}</div>`;

  if (Array.isArray(analysis.advice) && analysis.advice.length) {
    bodyHtml += `<div class="bridge-advice">` +
      analysis.advice.map(a => `<div class="bridge-advice-item">${escHtml(a)}</div>`).join('') +
      `</div>`;
  }
  if (analysis.knowledgeBridge?.topic) {
    const kb = analysis.knowledgeBridge;
    const facts = Array.isArray(kb.facts) ? kb.facts : [];
    bodyHtml += `<div class="bridge-kb">
      <div class="kb-label">${escHtml(T('knowledge_bridge'))}</div>
      <div class="kb-topic">${escHtml(kb.topic)}</div>
      ${facts.map(f => `<div class="kb-fact">${escHtml(f)}</div>`).join('')}
    </div>`;
  }

  const card = document.createElement('div');
  card.className = 'bridge-card';
  card.id = 'ai-body-' + analysis.messageId;
  card.innerHTML = bodyHtml;
  row.insertAdjacentElement('afterend', card);
}


function showThinking() {
  if (document.getElementById('thinking-indicator')) return;
  const wrap = document.getElementById('chat-wrap');
  const div = document.createElement('div');
  div.className = 'thinking-row'; div.id = 'thinking-indicator';
  div.innerHTML = '<div class="thinking-bubble"><div class="dots"><span></span><span></span><span></span></div></div>';
  wrap.appendChild(div); scrollToBottom();
}
function hideThinking() { document.getElementById('thinking-indicator')?.remove(); }

// ── Translation drawer ──────────────────────────────────────────────────────

async function openSettingsDrawer() {
  await loadRoomConfig();
  renderTranslateDrawer();
  document.getElementById('drawer-overlay').classList.add('open');
  const mineInput = document.getElementById('mine-color-input');
  if (mineInput) mineInput.value = localStorage.getItem('bridgeit_mine_color') || '#9C27B0';
  applyI18n();
  updateChatLangGrid();
}

function closeSettingsDrawer() {
  loadMineColor(); // restore preview if not saved
  document.getElementById('drawer-overlay').classList.remove('open');
}

async function saveSettings() {
  const items = document.querySelectorAll('#tl-order-list .tl-item');
  translateTo = [...items].map(el => el.dataset.lang);
  const mineInput = document.getElementById('mine-color-input');
  if (mineInput) {
    localStorage.setItem('bridgeit_mine_color', mineInput.value);
    applyMineColor(mineInput.value);
  }
  try {
    await fetch(`/rooms/${roomId}/translate`, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json', Authorization: 'Bearer ' + token },
      body: JSON.stringify({ translateTo }),
    });
    closeSettingsDrawer();
  } catch (e) { alert(T('save_failed')); }
}

function renderTranslateDrawer() {
  const content = document.getElementById('translate-drawer-content');
  const selected = LANGS.filter(l => translateTo.includes(l.code))
    .sort((a, b) => translateTo.indexOf(a.code) - translateTo.indexOf(b.code));
  const available = LANGS.filter(l => !translateTo.includes(l.code));

  let html = '';

  // Selected section (draggable)
  html += `<div class="tl-section-label" data-i18n="translate_to">${T('translate_to')}</div>`;
  if (selected.length === 0) {
    html += `<div class="tl-empty" data-i18n="no_translate_selected">${T('no_translate_selected')}</div>`;
  }
  html += `<div class="tl-order-list" id="tl-order-list">`;
  html += selected.map(l => `
    <div class="tl-item" data-lang="${l.code}">
      <span class="drag-handle">≡</span>
      <span class="tl-lang-label">${l.label}</span>
      <button class="tl-remove" onclick="removeLang('${l.code}')">×</button>
    </div>`).join('');
  html += `</div>`;

  // Available section
  if (available.length > 0) {
    html += `<div class="tl-section-label" style="margin-top:14px" data-i18n="add_translation">${T('add_translation')}</div>`;
    html += `<div class="tl-add-grid">`;
    html += available.map(l => `
      <button class="tl-add-btn" onclick="addLang('${l.code}')">${l.label} +</button>`).join('');
    html += `</div>`;
  }

  content.innerHTML = html;
  initDragHandles();
}

function addLang(code) {
  if (!translateTo.includes(code)) {
    translateTo = [...translateTo, code];
    renderTranslateDrawer();
  }
}

function removeLang(code) {
  translateTo = translateTo.filter(l => l !== code);
  renderTranslateDrawer();
}


// ── Drag to reorder ─────────────────────────────────────────────────────────

let dragState = null;

function initDragHandles() {
  const list = document.getElementById('tl-order-list');
  if (!list) return;
  list.querySelectorAll('.drag-handle').forEach(handle => {
    handle.addEventListener('pointerdown', onDragStart);
  });
}

function onDragStart(e) {
  e.preventDefault();
  e.stopPropagation();
  const item = e.currentTarget.closest('.tl-item');
  const list = item.parentElement;
  const rect = item.getBoundingClientRect();

  const ghost = item.cloneNode(true);
  ghost.style.cssText = `position:fixed;top:${rect.top}px;left:${rect.left}px;width:${rect.width}px;opacity:0.9;z-index:999;pointer-events:none;box-shadow:0 4px 20px rgba(0,0,0,0.15);border-radius:10px;background:var(--ai-green-bg);display:flex;align-items:center;gap:10px;padding:11px 14px;`;
  document.body.appendChild(ghost);

  const ph = document.createElement('div');
  ph.className = 'tl-placeholder';
  ph.style.height = rect.height + 'px';
  list.insertBefore(ph, item);
  item.style.opacity = '0';

  dragState = { item, list, ghost, ph, startY: e.clientY, rectTop: rect.top, itemH: rect.height };

  document.addEventListener('pointermove', onDragMove, { passive: false });
  document.addEventListener('pointerup', onDragEnd, { once: true });
  document.addEventListener('pointercancel', onDragEnd, { once: true });
  document.documentElement.style.userSelect = 'none';
}

function onDragMove(e) {
  if (!dragState) return;
  e.preventDefault();
  const dy = e.clientY - dragState.startY;
  dragState.ghost.style.top = (dragState.rectTop + dy) + 'px';

  const ghostMidY = dragState.rectTop + dy + dragState.itemH / 2;
  const siblings = [...dragState.list.querySelectorAll('.tl-item')];
  let insertBefore = null;
  for (const s of siblings) {
    if (s === dragState.item) continue;
    const r = s.getBoundingClientRect();
    if (ghostMidY < r.top + r.height / 2) { insertBefore = s; break; }
  }
  dragState.list.insertBefore(dragState.ph, insertBefore || null);
}

function onDragEnd(e) {
  if (!dragState) return;
  const { item, list, ghost, ph } = dragState;
  list.insertBefore(item, ph);
  item.style.opacity = '1';
  ph.remove();
  ghost.remove();
  document.documentElement.style.userSelect = '';
  // Update translateTo from new DOM order
  translateTo = [...list.querySelectorAll('.tl-item')].map(el => el.dataset.lang);
  dragState = null;
}

// ── Utilities ────────────────────────────────────────────────────────────────

function scrollToBottom() { const w = document.getElementById('chat-wrap'); w.scrollTop = w.scrollHeight; }
function formatTime(ts) { const d = new Date(ts); return d.getHours().toString().padStart(2,'0') + ':' + d.getMinutes().toString().padStart(2,'0'); }
function escHtml(t) { if (!t) return ''; const d = document.createElement('div'); d.textContent = t; return d.innerHTML; }

if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js').catch(() => {});
