<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BridgeIt</title>
  <link rel="manifest" href="/manifest.json">
  <link rel="stylesheet" href="/css/mobile.css">
  <style>
    .chat-wrap {
      position: fixed; top: 56px; left: 0; right: 0; bottom: 60px;
      overflow-y: auto; padding: 12px 12px 8px;
      -webkit-overflow-scrolling: touch;
    }

    /* 消息气泡 */
    .msg-row { display: flex; margin-bottom: 4px; align-items: flex-end; }
    .msg-row.mine { justify-content: flex-end; }
    .msg-row.theirs { justify-content: flex-start; }

    .bubble {
      max-width: 72%; padding: 10px 14px;
      border-radius: var(--bubble-radius); font-size: 0.92rem;
      line-height: 1.5; word-break: break-word;
      animation: fadeUp 0.25s ease;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .mine .bubble { background: var(--purple); color: white; border-bottom-right-radius: 4px; }
    .theirs .bubble { background: white; color: var(--text); border-bottom-left-radius: 4px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08); }

    .translation-text {
      margin-top: 6px; padding-top: 6px;
      border-top: 1px solid rgba(255,255,255,0.3);
      font-size: 0.78rem; color: rgba(255,255,255,0.75); line-height: 1.4;
    }
    .theirs .translation-text { border-top-color: rgba(0,0,0,0.08); color: #888; }

    .msg-time { font-size: 0.68rem; color: #CCC; margin: 0 4px 4px; align-self: flex-end; }

    /* AI 💡 inline */
    .ai-toggle {
      width: 24px; height: 24px; background: var(--ai-green-bg); border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; font-size: 0.72rem; border: none;
      transition: background 0.15s; flex-shrink: 0;
      align-self: flex-end; margin: 0 2px 4px;
    }
    .ai-toggle:active { background: #B2DFDB; }
    .ai-toggle.active { background: var(--ai-green); }
    .ai-card-body {
      display: none; margin: 2px 0 12px 0;
      background: var(--ai-green-bg); border-radius: 12px;
      padding: 12px 14px; animation: fadeUp 0.2s ease;
    }
    .ai-card-body.expanded { display: block; }
    .ai-full-text { font-size: 0.85rem; color: #004D40; line-height: 1.6; margin-bottom: 8px; }
    .ai-advice { font-size: 0.82rem; color: #00695C; line-height: 1.5; }
    .ai-advice-item { padding: 4px 0; }
    .ai-advice-item::before { content: '• '; color: var(--ai-green); }

    .kb-card {
      margin-top: 8px; padding: 10px 12px;
      background: white; border-radius: 10px; border-left: 3px solid var(--ai-green);
    }
    .kb-label { font-size: 0.7rem; font-weight: 700; color: var(--ai-green); margin-bottom: 4px; }
    .kb-topic { font-size: 0.82rem; font-weight: 600; color: #333; margin-bottom: 4px; }
    .kb-fact { font-size: 0.78rem; color: #666; line-height: 1.4; margin-top: 4px; }
    .kb-fact::before { content: '• '; }

    .topic-break { display: flex; align-items: center; margin: 16px 0; gap: 10px; }
    .topic-break-line { flex: 1; height: 1px; background: #E0E0E0; }
    .topic-break-label { font-size: 0.72rem; color: #CCC; white-space: nowrap; padding: 0 4px; }

    /* 底部输入栏 */
    .input-bar {
      position: fixed; bottom: 0; left: 0; right: 0;
      min-height: 60px; background: white; border-top: 1px solid var(--border);
      display: flex; align-items: flex-end;
      padding: 8px 12px; padding-bottom: max(8px, env(safe-area-inset-bottom)); gap: 8px;
    }
    .topic-btn {
      background: none; border: none; font-size: 1.1rem; cursor: pointer; color: #CCC;
      padding: 8px; border-radius: 8px; flex-shrink: 0; transition: color 0.2s;
      align-self: flex-end; margin-bottom: 1px;
    }
    .topic-btn:active { color: var(--purple); }
    .chat-input {
      flex: 1; padding: 9px 14px;
      border: 1.5px solid var(--border); border-radius: 22px;
      font-size: 0.9rem; outline: none; background: var(--bg);
      transition: border-color 0.2s; resize: none; overflow-y: hidden;
      min-height: 38px; max-height: 120px; line-height: 1.4;
      font-family: inherit; display: block; box-sizing: border-box;
    }
    .chat-input:focus { border-color: var(--purple); background: white; }
    .send-btn {
      width: 38px; height: 38px; border-radius: 50%;
      background: var(--purple); color: white;
      border: none; font-size: 1rem; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; transition: opacity 0.2s; align-self: flex-end;
    }
    .send-btn:disabled { opacity: 0.4; }

    .thinking-row { display: flex; margin-bottom: 8px; }
    .thinking-bubble { background: white; border-radius: 12px; padding: 10px 14px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
    .dots span { display: inline-block; width: 6px; height: 6px; background: #CCC; border-radius: 50%; margin: 0 2px; animation: dot 1.2s infinite; }
    .dots span:nth-child(2) { animation-delay: 0.2s; }
    .dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes dot { 0%,80%,100% { transform: scale(0.4); opacity: 0.3; } 40% { transform: scale(1); opacity: 1; } }

    .topbar-btn { background: none; border: none; font-size: 1.1rem; cursor: pointer; color: #888; padding: 6px; }

    .drawer-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 200; }
    .drawer-overlay.open { display: block; }
    .drawer { position: fixed; bottom: 0; left: 0; right: 0; background: white; border-radius: 20px 20px 0 0; padding: 20px 20px 40px; z-index: 201; max-height: 80vh; overflow-y: auto; }
    .drawer h3 { font-size: 1rem; margin-bottom: 16px; }

    /* Translation drawer */
    .tl-section-label { font-size: 0.72rem; color: #999; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; margin-top: 4px; }
    .tl-order-list { margin-bottom: 16px; }
    .tl-item {
      display: flex; align-items: center; gap: 10px;
      padding: 11px 14px; background: var(--ai-green-bg);
      border-radius: 10px; margin-bottom: 6px;
      touch-action: none; user-select: none;
    }
    .drag-handle { color: #B2DFDB; font-size: 1.1rem; cursor: grab; flex-shrink: 0; line-height: 1; }
    .drag-handle:active { cursor: grabbing; }
    .tl-lang-label { flex: 1; font-size: 0.88rem; color: #00695C; }
    .tl-remove { background: none; border: none; color: #B2DFDB; font-size: 1.2rem; cursor: pointer; padding: 2px 4px; line-height: 1; flex-shrink: 0; }
    .tl-remove:active { color: #F44336; }
    .tl-placeholder { background: #E8F5E9; border-radius: 10px; border: 2px dashed #80CBC4; margin-bottom: 6px; }
    .tl-add-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 16px; }
    .tl-add-btn { padding: 10px 12px; border: 1.5px solid var(--border); border-radius: 8px; background: white; font-size: 0.82rem; cursor: pointer; text-align: left; }
    .tl-add-btn:active { background: var(--bg); }
    .tl-empty { color: #CCC; font-size: 0.82rem; text-align: center; padding: 12px 0 4px; }
  </style>
</head>
<body>

<div class="topbar">
  <button class="back-btn" onclick="window.location.href='/home.html'">‹</button>
  <h1 id="partner-name">...</h1>
  <button class="topbar-btn" onclick="openTranslateDrawer()" title="翻译设置">🌐</button>
</div>

<div class="chat-wrap" id="chat-wrap"></div>

<div class="input-bar">
  <button class="topic-btn" onclick="sendTopicBreak()" title="新话题">↺</button>
  <textarea class="chat-input" id="chat-input" rows="1"
    data-i18n-ph="input_placeholder"
    onkeydown="handleKey(event)"
    oninput="autoGrow(this)"></textarea>
  <button class="send-btn" id="send-btn" onclick="sendMessage()">▶</button>
</div>

<div class="drawer-overlay" id="drawer-overlay" onclick="closeTranslateDrawer()">
  <div class="drawer" onclick="event.stopPropagation()">
    <h3 data-i18n="msg_translate">消息翻译</h3>
    <div id="translate-drawer-content"></div>
    <button class="btn-primary" onclick="saveTranslate()" data-i18n="save">保存</button>
  </div>
</div>

<script src="/js/i18n.js"></script>
<script src="/socket.io/socket.io.js"></script>
<script>
const LANGS = [
  { code: 'zh', label: '🇨🇳 中文' },
  { code: 'en', label: '🇺🇸 English' },
  { code: 'es', label: '🇪🇸 Español' },
  { code: 'ru', label: '🇷🇺 Русский' },
  { code: 'fr', label: '🇫🇷 Français' },
];

const token = localStorage.getItem('bridgeit_token');
const roomId = localStorage.getItem('bridgeit_current_room');
const partnerName = localStorage.getItem('bridgeit_partner_name') || '...';

if (!token || !roomId) window.location.href = '/home.html';

function getMyId() {
  try { return JSON.parse(atob(token.split('.')[1])).userId || null; } catch(e) { return null; }
}
const user = JSON.parse(localStorage.getItem('bridgeit_user') || '{}');
const myId = user.id || getMyId();

document.getElementById('partner-name').textContent = partnerName;
applyI18n();

let translateTo = [];

const socket = io({ auth: { token } });

socket.on('connect', async () => {
  await loadRoomConfig(); // must complete before rendering so translateTo order is correct
  socket.emit('join-room', roomId, ({ messages, error }) => {
    if (error) { window.location.href = '/home.html'; return; }
    messages.forEach(msg => renderItem(msg, false));
    messages.filter(m => m.analysis && !m.type && m.analysis.receiverId === myId)
      .forEach(m => renderAICard(m.analysis));
    scrollToBottom();
  });
});

socket.on('connect_error', () => window.location.href = '/login.html');
socket.on('new-message', msg => { if (msg.roomId === roomId) renderItem(msg, true); });
socket.on('ai-thinking', ({ roomId: rid, thinking }) => {
  if (rid !== roomId) return;
  if (thinking) showThinking(); else hideThinking();
});
socket.on('ai-analysis', analysis => {
  if (analysis.roomId !== roomId) return;
  hideThinking();
  attachTranslations(analysis);
  if (analysis.receiverId === myId) renderAICard(analysis);
});
socket.on('ai-error', ({ roomId: rid }) => {
  if (rid === roomId) hideThinking();
});
socket.on('topic-break', msg => { if (msg.roomId === roomId) renderItem(msg, true); });

async function loadRoomConfig() {
  try {
    const res = await fetch('/rooms', { headers: { Authorization: 'Bearer ' + token } });
    if (!res.ok) return;
    const rooms = await res.json();
    const room = rooms.find(r => r.id === roomId);
    translateTo = room?.translateTo || [];
  } catch (e) {}
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}

function autoGrow(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

function sendMessage() {
  const input = document.getElementById('chat-input');
  const text = input.value.trim();
  if (!text) return;
  input.value = '';
  input.style.height = 'auto';
  input.focus();
  socket.emit('send-message', { roomId, text });
}

function sendTopicBreak() {
  if (!confirm(T('new_topic_dialog'))) return;
  socket.emit('new-topic-break', { roomId });
}

function renderItem(msg, animate) {
  if (msg.type === 'topic-break') { renderTopicBreak(animate); return; }
  const isMe = (msg.senderId === myId);
  const wrap = document.getElementById('chat-wrap');

  const row = document.createElement('div');
  row.className = 'msg-row ' + (isMe ? 'mine' : 'theirs');
  if (!animate) row.style.animation = 'none';

  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.id = 'msg-' + msg.id;
  bubble.dataset.original = msg.text;

  let html = escHtml(msg.text);
  const translations = msg.translations || msg.analysis?.translations;
  if (translations) {
    const orderedLangs = translateTo.length > 0
      ? translateTo.filter(l => translations[l])
      : Object.keys(translations);
    const lines = orderedLangs
      .filter(lang => translations[lang] && translations[lang] !== msg.text)
      .map(lang => `<div class="translation-line">${escHtml(translations[lang])}</div>`);
    if (lines.length) html += `<div class="translation-text">${lines.join('')}</div>`;
  }

  bubble.innerHTML = html;
  row.appendChild(bubble);

  const time = document.createElement('div');
  time.className = 'msg-time';
  time.textContent = formatTime(msg.timestamp);
  row.appendChild(time);

  wrap.appendChild(row);
  if (animate) scrollToBottom();
}

function renderTopicBreak(animate) {
  const wrap = document.getElementById('chat-wrap');
  const div = document.createElement('div');
  div.className = 'topic-break';
  if (!animate) div.style.animation = 'none';
  div.innerHTML = `<div class="topic-break-line"></div><div class="topic-break-label">${escHtml(T('new_topic_label'))}</div><div class="topic-break-line"></div>`;
  wrap.appendChild(div);
  if (animate) scrollToBottom();
}

function attachTranslations(analysis) {
  if (!analysis.translations || !analysis.messageId) return;
  const bubble = document.getElementById('msg-' + analysis.messageId);
  if (!bubble || bubble.querySelector('.translation-text')) return;
  const original = bubble.dataset.original || '';
  const translations = analysis.translations;
  const orderedLangs = translateTo.length > 0
    ? translateTo.filter(l => translations[l])
    : Object.keys(translations);
  const lines = orderedLangs
    .filter(lang => translations[lang] && translations[lang] !== original)
    .map(lang => `<div class="translation-line">${escHtml(translations[lang])}</div>`);
  if (lines.length) {
    const div = document.createElement('div');
    div.className = 'translation-text';
    div.innerHTML = lines.join('');
    bubble.appendChild(div);
  }
}

function renderAICard(analysis) {
  const bubble = document.getElementById('msg-' + analysis.messageId);
  if (!bubble) return;
  const row = bubble.parentElement;
  if (!row || row.querySelector('.ai-toggle')) return;

  const btn = document.createElement('button');
  btn.className = 'ai-toggle';
  btn.textContent = '💡';
  btn.onclick = () => toggleAI(analysis.messageId);
  row.insertBefore(btn, row.lastChild); // before time

  let bodyHtml = `<div class="ai-full-text">${escHtml(analysis.insight || '')}</div>`;
  if (Array.isArray(analysis.advice) && analysis.advice.length) {
    bodyHtml += `<div class="ai-advice">` +
      analysis.advice.map(a => `<div class="ai-advice-item">${escHtml(a)}</div>`).join('') +
      `</div>`;
  }
  if (analysis.knowledgeBridge?.topic) {
    const kb = analysis.knowledgeBridge;
    const facts = Array.isArray(kb.facts) ? kb.facts : [];
    bodyHtml += `<div class="kb-card">
      <div class="kb-label">${escHtml(T('knowledge_bridge'))}</div>
      <div class="kb-topic">${escHtml(kb.topic)}</div>
      ${facts.map(f => `<div class="kb-fact">${escHtml(f)}</div>`).join('')}
    </div>`;
  }

  const body = document.createElement('div');
  body.className = 'ai-card-body';
  body.id = 'ai-body-' + analysis.messageId;
  body.innerHTML = bodyHtml;
  row.insertAdjacentElement('afterend', body);
}

function toggleAI(messageId) {
  const body = document.getElementById('ai-body-' + messageId);
  const row = document.getElementById('msg-' + messageId)?.parentElement;
  const btn = row?.querySelector('.ai-toggle');
  if (body) {
    body.classList.toggle('expanded');
    btn?.classList.toggle('active');
  }
}

function showThinking() {
  if (document.getElementById('thinking-indicator')) return;
  const wrap = document.getElementById('chat-wrap');
  const div = document.createElement('div');
  div.className = 'thinking-row'; div.id = 'thinking-indicator';
  div.innerHTML = '<div class="thinking-bubble"><div class="dots"><span></span><span></span><span></span></div></div>';
  wrap.appendChild(div); scrollToBottom();
}
function hideThinking() { document.getElementById('thinking-indicator')?.remove(); }

// ── Translation drawer ──────────────────────────────────────────────────────

async function openTranslateDrawer() {
  await loadRoomConfig();
  renderTranslateDrawer();
  document.getElementById('drawer-overlay').classList.add('open');
}

function closeTranslateDrawer() { document.getElementById('drawer-overlay').classList.remove('open'); }

function renderTranslateDrawer() {
  const content = document.getElementById('translate-drawer-content');
  const selected = LANGS.filter(l => translateTo.includes(l.code))
    .sort((a, b) => translateTo.indexOf(a.code) - translateTo.indexOf(b.code));
  const available = LANGS.filter(l => !translateTo.includes(l.code));

  let html = '';

  // Selected section (draggable)
  html += `<div class="tl-section-label" data-i18n="translate_to">${T('translate_to')}</div>`;
  if (selected.length === 0) {
    html += `<div class="tl-empty" data-i18n="no_translate_selected">${T('no_translate_selected')}</div>`;
  }
  html += `<div class="tl-order-list" id="tl-order-list">`;
  html += selected.map(l => `
    <div class="tl-item" data-lang="${l.code}">
      <span class="drag-handle">≡</span>
      <span class="tl-lang-label">${l.label}</span>
      <button class="tl-remove" onclick="removeLang('${l.code}')">×</button>
    </div>`).join('');
  html += `</div>`;

  // Available section
  if (available.length > 0) {
    html += `<div class="tl-section-label" style="margin-top:14px" data-i18n="add_translation">${T('add_translation')}</div>`;
    html += `<div class="tl-add-grid">`;
    html += available.map(l => `
      <button class="tl-add-btn" onclick="addLang('${l.code}')">${l.label} +</button>`).join('');
    html += `</div>`;
  }

  content.innerHTML = html;
  initDragHandles();
}

function addLang(code) {
  if (!translateTo.includes(code)) {
    translateTo = [...translateTo, code];
    renderTranslateDrawer();
  }
}

function removeLang(code) {
  translateTo = translateTo.filter(l => l !== code);
  renderTranslateDrawer();
}

async function saveTranslate() {
  // Read current order from DOM
  const items = document.querySelectorAll('#tl-order-list .tl-item');
  translateTo = [...items].map(el => el.dataset.lang);
  try {
    await fetch(`/rooms/${roomId}/translate`, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json', Authorization: 'Bearer ' + token },
      body: JSON.stringify({ translateTo }),
    });
    closeTranslateDrawer();
  } catch (e) { alert(T('save_failed')); }
}

// ── Drag to reorder ─────────────────────────────────────────────────────────

let dragState = null;

function initDragHandles() {
  const list = document.getElementById('tl-order-list');
  if (!list) return;
  list.querySelectorAll('.drag-handle').forEach(handle => {
    handle.addEventListener('pointerdown', onDragStart);
  });
}

function onDragStart(e) {
  e.preventDefault();
  e.stopPropagation();
  const item = e.currentTarget.closest('.tl-item');
  const list = item.parentElement;
  const rect = item.getBoundingClientRect();

  const ghost = item.cloneNode(true);
  ghost.style.cssText = `position:fixed;top:${rect.top}px;left:${rect.left}px;width:${rect.width}px;opacity:0.9;z-index:999;pointer-events:none;box-shadow:0 4px 20px rgba(0,0,0,0.15);border-radius:10px;background:var(--ai-green-bg);display:flex;align-items:center;gap:10px;padding:11px 14px;`;
  document.body.appendChild(ghost);

  const ph = document.createElement('div');
  ph.className = 'tl-placeholder';
  ph.style.height = rect.height + 'px';
  list.insertBefore(ph, item);
  item.style.opacity = '0';

  dragState = { item, list, ghost, ph, startY: e.clientY, rectTop: rect.top, itemH: rect.height };

  document.addEventListener('pointermove', onDragMove, { passive: false });
  document.addEventListener('pointerup', onDragEnd, { once: true });
  document.addEventListener('pointercancel', onDragEnd, { once: true });
  document.documentElement.style.userSelect = 'none';
}

function onDragMove(e) {
  if (!dragState) return;
  e.preventDefault();
  const dy = e.clientY - dragState.startY;
  dragState.ghost.style.top = (dragState.rectTop + dy) + 'px';

  const ghostMidY = dragState.rectTop + dy + dragState.itemH / 2;
  const siblings = [...dragState.list.querySelectorAll('.tl-item')];
  let insertBefore = null;
  for (const s of siblings) {
    if (s === dragState.item) continue;
    const r = s.getBoundingClientRect();
    if (ghostMidY < r.top + r.height / 2) { insertBefore = s; break; }
  }
  dragState.list.insertBefore(dragState.ph, insertBefore || null);
}

function onDragEnd(e) {
  if (!dragState) return;
  const { item, list, ghost, ph } = dragState;
  list.insertBefore(item, ph);
  item.style.opacity = '1';
  ph.remove();
  ghost.remove();
  document.documentElement.style.userSelect = '';
  // Update translateTo from new DOM order
  translateTo = [...list.querySelectorAll('.tl-item')].map(el => el.dataset.lang);
  dragState = null;
}

// ── Utilities ────────────────────────────────────────────────────────────────

function scrollToBottom() { const w = document.getElementById('chat-wrap'); w.scrollTop = w.scrollHeight; }
function formatTime(ts) { const d = new Date(ts); return d.getHours().toString().padStart(2,'0') + ':' + d.getMinutes().toString().padStart(2,'0'); }
function escHtml(t) { if (!t) return ''; const d = document.createElement('div'); d.textContent = t; return d.innerHTML; }

if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js').catch(() => {});
</script>
</body>
</html>
